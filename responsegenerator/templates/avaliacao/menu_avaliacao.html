{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PonderSEC — Setup</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: "Space Grotesk", system-ui, sans-serif;
            background: radial-gradient(circle at top, #051015 0, #02060b 45%, #000000 100%);
            color: #e5fef6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .background-grid {
            position: fixed; inset: 0;
            background-image:
                linear-gradient(90deg, rgba(0, 255, 160, 0.06) 1px, transparent 1px),
                linear-gradient(180deg, rgba(0, 255, 160, 0.06) 1px, transparent 1px);
            background-size: 40px 40px; opacity: 0.4; pointer-events: none;
        }

        .scanline {
            position: fixed; inset: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7), rgba(0,0,0,0.15), rgba(0,0,0,0.7));
            background-size: 100% 4px; opacity: 0.25; pointer-events: none;
        }

        .glow-orb {
            position: fixed; width: 600px; height: 600px; border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 255, 160, 0.15), transparent 70%);
            top: -15%; right: -10%; filter: blur(100px); opacity: 0.8; pointer-events: none;
        }

        .glow-orb-2 {
            position: fixed; width: 400px; height: 400px; border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 180, 255, 0.08), transparent 70%);
            bottom: -10%; left: -5%; filter: blur(80px); opacity: 0.6; pointer-events: none;
        }

        .container {
            position: relative; width: 100%; max-width: 780px;
            background: radial-gradient(circle at top, #0b141d 0, #050a11 55%, #020509 100%);
            border-radius: 22px; padding: 44px 50px;
            box-shadow:
                0 0 0 1px rgba(0, 255, 160, 0.15),
                0 24px 80px rgba(0, 0, 0, 0.95),
                0 0 60px rgba(0, 255, 160, 0.08);
            z-index: 2;
        }

        .header {
            display: flex; align-items: center; gap: 22px; margin-bottom: 38px;
            padding-bottom: 28px;
            border-bottom: 1px solid rgba(0, 255, 160, 0.08);
        }

        .logo img {
            width: 72px; border-radius: 14px;
            filter: drop-shadow(0 0 14px rgba(0, 255, 160, 0.6));
        }

        .header-text { flex: 1; }

        .product-name {
            color: #4ecf9a; text-transform: uppercase;
            letter-spacing: 0.3em; font-size: 11px;
            font-weight: 600; margin-bottom: 5px;
        }

        .headline {
            color: #00ff9f; font-size: 30px; font-weight: 700;
            letter-spacing: -0.01em; margin-bottom: 5px;
            text-shadow: 0 0 30px rgba(0, 255, 160, 0.3);
        }

        .subtitle { font-size: 13px; color: #5a7a8a; }

        .section-label {
            font-size: 10px; color: #4ecf9a; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.25em;
            margin-bottom: 18px; display: flex; align-items: center; gap: 12px;
        }

        .section-label::after {
            content: ''; flex: 1; height: 1px;
            background: linear-gradient(to right, rgba(0, 255, 160, 0.2), transparent);
        }

        .cards-grid {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 18px; margin-bottom: 32px;
        }

        .card {
            padding: 32px 28px;
            background: linear-gradient(135deg, rgba(11, 20, 29, 0.9) 0%, rgba(5, 10, 17, 0.95) 100%);
            border: 1px solid rgba(0, 255, 160, 0.1);
            border-radius: 16px; cursor: pointer;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
            display: flex; flex-direction: column;
            align-items: flex-start; gap: 14px;
            position: relative; overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute; inset: 0;
            background: radial-gradient(circle at 0% 0%, rgba(0, 255, 160, 0.06) 0%, transparent 60%);
            opacity: 0; transition: opacity 0.35s;
        }

        .card:hover::before { opacity: 1; }

        .card:hover {
            border-color: rgba(0, 255, 160, 0.35);
            box-shadow:
                0 0 0 1px rgba(0, 255, 160, 0.1),
                0 12px 40px rgba(0, 0, 0, 0.6),
                0 0 30px rgba(0, 255, 160, 0.08);
            transform: translateY(-5px);
        }

        .card-icon {
            width: 52px; height: 52px;
            background: rgba(0, 255, 160, 0.06);
            border: 1px solid rgba(0, 255, 160, 0.15);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.35s;
        }

        .card:hover .card-icon {
            background: rgba(0, 255, 160, 0.1);
            border-color: rgba(0, 255, 160, 0.3);
            box-shadow: 0 0 20px rgba(0, 255, 160, 0.15);
        }

        .card-icon svg {
            filter: drop-shadow(0 0 6px rgba(0, 255, 160, 0.4));
            transition: filter 0.35s;
        }

        .card:hover .card-icon svg {
            filter: drop-shadow(0 0 12px rgba(0, 255, 160, 0.7));
        }

        .card-title {
            color: #00ff9f; font-size: 16px;
            font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .card-desc {
            font-size: 12.5px; color: #5a7a8a;
            line-height: 1.6; flex: 1;
        }

        .card-footer {
            display: flex; align-items: center; gap: 6px;
            color: rgba(0, 255, 160, 0.35); font-size: 12px;
            font-weight: 600; text-transform: uppercase;
            letter-spacing: 0.1em; transition: all 0.35s;
        }

        .card:hover .card-footer {
            color: #00ff9f;
            gap: 10px;
        }

        .card-footer svg { transition: transform 0.35s; }
        .card:hover .card-footer svg { transform: translateX(3px); }

        .btn-back {
            width: 100%; padding: 14px;
            background: rgba(255, 70, 70, 0.06);
            border: 1px solid rgba(255, 70, 70, 0.2);
            border-radius: 12px; cursor: pointer;
            font-size: 12px; font-weight: 700; color: #cc5555;
            text-decoration: none; text-transform: uppercase;
            letter-spacing: 0.12em; transition: all 0.25s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }

        .btn-back:hover {
            background: rgba(255, 70, 70, 0.12);
            border-color: rgba(255, 70, 70, 0.4);
            color: #ff6b6b;
        }

        @media (max-width: 600px) {
            .cards-grid { grid-template-columns: 1fr; }
            .header { flex-direction: column; text-align: center; }
            .container { padding: 30px 24px; }
        }
    </style>
</head>
<body>
    <div class="background-grid"></div>
    <div class="scanline"></div>
    <div class="glow-orb"></div>
    <div class="glow-orb-2"></div>

    <div class="container">
        <div class="header">
            <div class="logo">
                <img src="{% static 'pondersec_logo.jpg' %}" alt="PonderSEC Logo">
            </div>
            <div class="header-text">
                <div class="product-name">PonderSEC</div>
                <div class="headline">Setup</div>
                <div class="subtitle">Configure os parâmetros do sistema</div>
            </div>
        </div>

        <div class="section-label">Configurações</div>

        <div class="cards-grid">
            <a href="{% url 'dashboard_avaliacoes' %}" class="card">
                <div class="card-icon">
                   
                     <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#00ff9f" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 20h18"/>
                        <path d="M5 20V14"/>
                        <path d="M8 20V10"/>
                        <path d="M11 20V6"/>
                        <path d="M14 20V9"/>
                        <path d="M17 20V13"/>
                        <path d="M20 20V16"/>
                        <path d="M5 14l3-4 3-4 3 3 3-6 3 4"/>
                    </svg>
                </div>
                <div class="card-title">DASHBOARD</div>
                <div class="card-desc">Visualize e analise os resultados das avaliações previamente concluídas.</div>
                <div class="card-footer">
                    Acessar
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                        <path d="M5 12h14M13 6l6 6-6 6"/>
                    </svg>
                </div>
            </a>

            <a href="{% url 'avaliacao' %}" class="card">
                <div class="card-icon">
                     <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#00ff9f" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2a2 2 0 0 1 2 2v2a2 2 0 0 1-2 2 2 2 0 0 1-2-2V4a2 2 0 0 1 2-2z"/>
                        <path d="M12 8v3"/>
                        <path d="M6.5 11a5.5 5.5 0 0 0 11 0"/>
                        <rect x="3" y="11" width="4" height="7" rx="1"/>
                        <rect x="17" y="11" width="4" height="7" rx="1"/>
                        <path d="M7 18h10"/>
                        <path d="M9 21h6"/>
                    </svg>
                   
                </div>
                <div class="card-title">Geração de Formulário</div>
                <div class="card-desc">Gere formulários que serão usados para a coleta de avaliações.</div>
                <div class="card-footer">
                    Acessar
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                        <path d="M5 12h14M13 6l6 6-6 6"/>
                    </svg>
                </div>
            </a>
        </div>

        <a href="{% url 'menu' %}" class="btn-back">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                <path d="M19 12H5M11 6l-6 6 6 6"/>
            </svg>
            Voltar ao Menu
        </a>
    </div>
</body>
</html>
