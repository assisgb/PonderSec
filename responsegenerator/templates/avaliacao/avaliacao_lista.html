{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PonderSEC — Avaliação</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: "Space Grotesk", system-ui, sans-serif;
            background: radial-gradient(circle at top, #051015 0, #02060b 45%, #000000 100%);
            color: #e5fef6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .background-grid {
            position: fixed; inset: 0;
            background-image:
                linear-gradient(90deg, rgba(0, 255, 160, 0.06) 1px, transparent 1px),
                linear-gradient(180deg, rgba(0, 255, 160, 0.06) 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.4; pointer-events: none;
        }

        .scanline {
            position: fixed; inset: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7), rgba(0,0,0,0.15), rgba(0,0,0,0.7));
            background-size: 100% 4px;
            opacity: 0.25; pointer-events: none;
        }

        .glow-orb {
            position: fixed; width: 500px; height: 500px; border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 255, 160, 0.25), transparent 70%);
            top: -10%; right: -5%;
            filter: blur(80px); opacity: 0.6; pointer-events: none;
        }

        .container { position: relative; max-width: 1200px; width: 100%; z-index: 2; }

        .header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 35px; padding: 30px 35px;
            background: rgba(11, 20, 29, 0.6);
            border-radius: 16px; border: 1px solid rgba(0, 255, 160, 0.15);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .logo-section { display: flex; align-items: center; gap: 22px; }

        .logo-section img {
            width: 85px; height: 85px; border-radius: 12px;
            filter: drop-shadow(0 0 8px rgba(0, 255, 160, 0.4));
        }

        .header-title { display: flex; flex-direction: column; gap: 6px; }

        .product-name {
            color: #7df6c2; text-transform: uppercase;
            letter-spacing: 0.25em; font-size: 12px; font-weight: 600;
        }

        .page-title { color: #00ff9f; font-size: 28px; font-weight: 600; }

        .btn-back {
            padding: 14px 32px; background: rgba(0, 255, 160, 0.1);
            border: 1px solid rgba(0, 255, 160, 0.3); border-radius: 8px;
            cursor: pointer; font-size: 15px; font-weight: 600; color: #00ff9f;
            text-decoration: none; text-transform: uppercase; letter-spacing: 0.05em;
            transition: all 0.2s;
        }

        .btn-back:hover {
            background: rgba(0, 255, 160, 0.15); border-color: #00ff9f;
            transform: translateY(-1px);
        }

        .toolbar { display: flex; gap: 18px; margin-bottom: 30px; }

        .search-bar { position: relative; flex: 1; }

        .search-input {
            width: 100%; padding: 16px 20px 16px 50px;
            background: #050a11; border: 1px solid #1b2635;
            border-radius: 10px; color: #e5fef6; font-size: 16px;
            font-family: "Space Grotesk", system-ui, sans-serif;
            outline: none; transition: all 0.2s;
        }

        .search-input::placeholder { color: #6b7b8d; }

        .search-input:focus {
            border-color: #00ff9f;
            box-shadow: 0 0 8px rgba(0, 255, 160, 0.3);
        }

        .search-icon {
            position: absolute; left: 18px; top: 50%;
            transform: translateY(-50%); color: #7df6c2; font-size: 20px;
        }

        .btn-add {
            padding: 16px 32px; background: rgba(0, 255, 160, 0.1);
            border: 1px solid rgba(0, 255, 160, 0.3); border-radius: 8px;
            cursor: pointer; font-size: 16px; font-weight: 600; color: #00ff9f;
            text-transform: uppercase; letter-spacing: 0.05em;
            transition: all 0.2s; white-space: nowrap; text-decoration: none;
            display: flex; align-items: center;
        }

        .btn-add:hover {
            background: rgba(0, 255, 160, 0.15); border-color: #00ff9f;
            transform: translateY(-1px);
        }

        .forms-list { display: flex; flex-direction: column; gap: 16px; }

        .form-card {
            display: flex; align-items: center; justify-content: space-between;
            padding: 24px 30px;
            background: rgba(11, 20, 29, 0.4);
            border: 1px solid rgba(0, 255, 160, 0.15);
            border-radius: 12px; transition: all 0.2s;
        }

        .form-card:hover {
            border-color: rgba(0, 255, 160, 0.3);
            background: rgba(11, 20, 29, 0.6);
            transform: translateX(4px);
        }

        .form-info { display: flex; align-items: center; gap: 20px; flex: 1; }

        .form-icon { font-size: 32px; min-width: 45px; text-align: center; }

        .form-name { font-size: 18px; font-weight: 500; color: #e5fef6; }

        .form-meta { font-size: 13px; color: #6b7b8d; margin-top: 4px; }

        .form-actions { display: flex; gap: 10px; align-items: center; }

        .btn-action {
            padding: 10px 20px;
            background: rgba(0, 255, 160, 0.08);
            border: 1px solid rgba(0, 255, 160, 0.2);
            border-radius: 7px; cursor: pointer;
            font-size: 14px; font-weight: 600; color: #00ff9f;
            text-transform: uppercase; letter-spacing: 0.05em;
            transition: all 0.2s; text-decoration: none; white-space: nowrap;
        }

        .btn-action:hover {
            background: rgba(0, 255, 160, 0.15); border-color: #00ff9f;
            box-shadow: 0 0 10px rgba(0, 255, 160, 0.25);
        }

        .btn-action.del {
            color: #ff5566; border-color: rgba(255, 85, 102, 0.2);
            background: rgba(255, 85, 102, 0.08);
        }

        .btn-action.del:hover {
            background: rgba(255, 85, 102, 0.15); border-color: #ff5566;
            box-shadow: 0 0 10px rgba(255, 85, 102, 0.25);
        }

        .empty-state {
            text-align: center; padding: 60px 20px;
            color: #6b7b8d; font-size: 16px;
        }

        .empty-state .empty-icon { font-size: 48px; margin-bottom: 16px; }
    </style>
</head>
<body>
    <div class="background-grid"></div>
    <div class="scanline"></div>
    <div class="glow-orb"></div>

    <div class="container">
        <div class="header">
            <div class="logo-section">
                <img src="{% static 'pondersec_logo.jpg' %}" alt="PonderSEC Logo">
                <div class="header-title">
                    <div class="product-name">PONDERSEC</div>
                    <div class="page-title">Avaliação</div>
                </div>
            </div>
            <a href="{% url 'menu' %}" class="btn-back">Voltar</a>
        </div>

        <div class="toolbar">
            <div class="search-bar">
                <span class="search-icon">🔎</span>
                <input type="text" class="search-input" id="searchInput"
                    placeholder="Buscar formulário..." onkeyup="filterForms()">
            </div>
            <a href="{% url 'avaliacao_adicionar_formulario' %}" class="btn-add">+ Adicionar Formulário</a>
        </div>

        <div class="forms-list" id="formsList">
            <!-- Formulários virão do backend -->
            {% for formulario in formularios %}
            <div class="form-card" data-text="{{ formulario.nome|lower }}">
                <div class="form-info">
                    <div class="form-icon">📋</div>
                    <div>
                        <div class="form-name">{{ formulario.nome }}</div>
                        <div class="form-meta">{{ formulario.questoes.count }} pergunta(s)</div>
                    </div>
                </div>
                <div class="form-actions">
                    <a href="{% url 'avaliacao_editar_formulario' formulario.id %}" class="btn-action">Edit</a>
                    <a href="{% url 'avaliacao_deletar_formulario' formulario.id %}" class="btn-action del">Del</a>
                    <a href="{% url 'avaliacao_enviar_formulario' formulario.id %}" class="btn-action">Enviar</a>
                </div>
            </div>
            {% empty %}
            <div class="empty-state">
                <div class="empty-icon">📭</div>
                Nenhum formulário cadastrado ainda.
            </div>
            {% endfor %}
        </div>
    </div>

    <script>
        function filterForms() {
            const filter = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.form-card').forEach(card => {
                card.style.display = card.getAttribute('data-text').includes(filter) ? '' : 'none';
            });
        }
    </script>
</body>
</html>
