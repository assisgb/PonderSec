{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PonderSEC — Questões</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: "Space Grotesk", system-ui, sans-serif;
            background: radial-gradient(circle at top, #051015 0, #02060b 45%, #000000 100%);
            color: #e5fef6;
            min-height: 100vh;
            padding: 20px;
        }
        
        .background-grid {
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(90deg, rgba(0, 255, 160, 0.06) 1px, transparent 1px),
                linear-gradient(180deg, rgba(0, 255, 160, 0.06) 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.4;
            pointer-events: none;
            z-index: 0;
        }
        
        .scanline {
            position: fixed;
            inset: 0;
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.15), rgba(0, 0, 0, 0.7));
            background-size: 100% 4px;
            opacity: 0.25;
            pointer-events: none;
            z-index: 0;
        }

        .glow-orb {
            position: fixed;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 255, 160, 0.25), transparent 70%);
            top: -10%;
            right: -5%;
            filter: blur(80px);
            opacity: 0.6;
            pointer-events: none;
            z-index: 0;
        }
        
        .container {
            position: relative;
            max-width: 1200px;
            margin: 0 auto;
            z-index: 2;
        }
        
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 35px;
            padding: 30px 35px;
            background: rgba(11, 20, 29, 0.6);
            border-radius: 16px;
            border: 1px solid rgba(0, 255, 160, 0.15);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }
        
        .logo-section {
            display: flex;
            align-items: center;
            gap: 22px;
        }

        .logo-section img {
            width: 85px;
            height: 85px;
            border-radius: 12px;
            filter: drop-shadow(0 0 8px rgba(0, 255, 160, 0.4));
        }
        
        .header-title {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .product-name {
            color: #7df6c2;
            text-transform: uppercase;
            letter-spacing: 0.25em;
            font-size: 12px;
            font-weight: 600;
        }

        .page-title {
            color: #00ff9f;
            font-size: 28px;
            font-weight: 600;
        }
        
        .btn-back {
            padding: 14px 32px;
            background: rgba(0, 255, 160, 0.1);
            border: 1px solid rgba(0, 255, 160, 0.3);
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            color: #00ff9f;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: all 0.2s;
        }

        .btn-back:hover {
            background: rgba(0, 255, 160, 0.15);
            border-color: #00ff9f;
            transform: translateY(-1px);
        }

        .filter-section {
            margin-bottom: 30px;
            padding: 24px;
            background: rgba(11, 20, 29, 0.4);
            border: 1px solid rgba(0, 255, 160, 0.15);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .filter-top {
            display: flex;
            gap: 16px;
            align-items: center;
        }
        
        .search-box {
            flex: 1;
            padding: 16px 20px;
            background: #050a11;
            border: 1px solid #1b2635;
            border-radius: 10px;
            color: #e5fef6;
            font-size: 16px;
            outline: none;
            font-family: "Space Grotesk", sans-serif;
            transition: all 0.2s;
        }

        .search-box::placeholder {
            color: #6b7b8d;
        }

        .search-box:focus {
            border-color: #00ff9f;
            box-shadow: 0 0 8px rgba(0, 255, 160, 0.3);
        }

        .questoes-options {
            display: flex;
            gap: 12px;
        }

        .button-primary {
            padding: 14px 28px;
            background: rgba(0, 255, 160, 0.12);
            border: 1px solid rgba(0, 255, 160, 0.3);
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            color: #00ff9f;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .button-primary:hover {
            background: rgba(0, 255, 160, 0.2);
            border-color: #00ff9f;
            box-shadow: 0 0 12px rgba(0, 255, 160, 0.3);
        }

        .btn-clear-all {
            padding: 12px 24px;
            background: rgba(255, 0, 80, 0.08);
            border: 1px solid rgba(255, 0, 80, 0.3);
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            color: #ff4d80;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .btn-clear-all:hover {
            background: rgba(255, 0, 80, 0.15);
            border-color: #ff0050;
            transform: translateY(-1px);
        }

        .history-grid {
            display: grid;
            gap: 18px;
        }
        
        .history-card {
            background: rgba(11, 20, 29, 0.4);
            border: 1px solid rgba(0, 255, 160, 0.15);
            border-radius: 12px;
            padding: 24px 28px;
            transition: all 0.2s;
        }

        .history-card:hover {
            border-color: rgba(0, 255, 160, 0.3);
            background: rgba(11, 20, 29, 0.6);
            transform: translateX(4px);
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .card-date {
            font-size: 11px;
            color: #7df6c2;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            padding: 6px 14px;
            background: rgba(0, 255, 160, 0.12);
            border-radius: 20px;
            font-weight: 600;
        }
        
        .card-actions {
            display: flex;
            gap: 10px;
        }
        
        .btn-icon {
            background: rgba(0, 255, 160, 0.08);
            border: 1px solid rgba(0, 255, 160, 0.2);
            color: #7df6c2;
            width: 38px;
            height: 38px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            font-size: 16px;
            text-decoration: none;
        }

        .btn-icon:hover {
            background: rgba(0, 255, 160, 0.15);
            border-color: rgba(0, 255, 160, 0.4);
            color: #00ff9f;
            transform: scale(1.05);
        }

        .card-question {
            font-size: 18px;
            font-weight: 600;
            color: #e5fef6;
            margin-bottom: 12px;
            line-height: 1.5;
        }

        .card-preview {
            font-size: 14px;
            color: #8ba1b0;
            line-height: 1.7;
            margin-bottom: 16px;
        }
        
        .card-footer {
            display: flex;
            gap: 10px;
            padding-top: 14px;
            border-top: 1px solid rgba(0, 255, 160, 0.12);
        }

        .tag {
            font-size: 10px;
            color: #7df6c2;
            background: rgba(0, 255, 160, 0.1);
            padding: 5px 12px;
            border-radius: 14px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .empty-state {
            text-align: center;
            color: #6b7b8d;
            padding: 60px 20px;
            background: rgba(11, 20, 29, 0.3);
            border: 1px dashed rgba(0, 255, 160, 0.2);
            border-radius: 12px;
        }

        .empty-state h2 {
            font-size: 20px;
            margin-bottom: 8px;
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(5px);
            z-index: 99999;
            display: none;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }
        
        .modal-box {
            background: radial-gradient(circle at top left, #0b141d 0, #050a11 100%);
            border: 1px solid rgba(0, 255, 160, 0.3);
            box-shadow: 0 0 40px rgba(0, 255, 160, 0.2);
            padding: 36px;
            border-radius: 16px;
            width: 90%;
            max-width: 440px;
            text-align: center;
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }

        .modal-overlay.active .modal-box {
            transform: scale(1);
        }
        
        .modal-title {
            color: #00ff9f;
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .modal-desc {
            color: #8ba1b0;
            font-size: 15px;
            margin-bottom: 28px;
            line-height: 1.6;
        }
        
        .modal-buttons {
            display: flex;
            gap: 14px;
            justify-content: center;
        }
        
        .btn-modal {
            padding: 14px 32px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            font-family: "Space Grotesk", sans-serif;
            transition: all 0.2s;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        
        .btn-cancel {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #8ba1b0;
        }

        .btn-cancel:hover {
            border-color: rgba(255, 255, 255, 0.4);
            color: #e5fef6;
            background: rgba(255, 255, 255, 0.05);
        }
        
        .btn-confirm {
            background: rgba(255, 77, 77, 0.15);
            border: 1px solid #ff4d4d;
            color: #ff4d4d;
        }

        .btn-confirm:hover {
            background: #ff4d4d;
            color: #fff;
            box-shadow: 0 0 20px rgba(255, 77, 77, 0.5);
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }

            .logo-section {
                flex-direction: column;
            }

            .btn-back {
                width: 100%;
            }

            .filter-top {
                flex-direction: column;
            }

            .questoes-options {
                width: 100%;
                flex-direction: column;
            }

            .button-primary,
            .btn-clear-all {
                width: 100%;
            }

            .modal-buttons {
                flex-direction: column;
            }

            .btn-modal {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="background-grid"></div>
    <div class="scanline"></div>
    <div class="glow-orb"></div>

    <div class="container">
        <div class="header">
            <div class="logo-section">
                <img src="{% static 'pondersec_logo.jpg' %}" alt="PonderSEC Logo">
                <div class="header-title">
                    <div class="product-name">PONDERSEC</div>
                    <div class="page-title">Questões</div>
                </div>
            </div>
            <a href="{% url 'menu' %}" class="btn-back">Voltar</a>
        </div>

        <div class="filter-section">
            <div class="filter-top">
                <input type="text" class="search-box" id="searchInput" placeholder="Filtro de pesquisa..." onkeyup="filterHistory()">
                
                <div class="questoes-options">
                    <a href="{% url 'questoes_upload'%}" class="button-primary">Upload</a>
                    <a href="{% url 'add_questoes' %}" class="button-primary">Adicionar</a>
                </div>
            </div>
            

        <div class="history-grid" id="historyGrid">
            {% if questoes %}

                {% for questao in questoes %}
                    <div class="history-card">{{questao.conteudo}}</div>
                {% endfor %}
                
            {% else %}
                <div class="empty-state">
                    <h2>Nenhuma questão cadastrada</h2>
                    <p style="margin-top: 8px; font-size: 14px;">Adicione sua primeira questão para começar</p>
                </div>
            {% endif %}
        </div>
    </div>

    <div class="modal-overlay" id="modalUniversal">
        <div class="modal-box">
            <div class="modal-title" id="modalTitle">Título</div>
            <div class="modal-desc" id="modalDesc">Descrição</div>
            
            <div class="modal-buttons">
                <button type="button" class="btn-modal btn-cancel" onclick="fecharModal()">Cancelar</button>
                
                <form id="modalForm" method="POST" action="" style="display: inline;">
                    {% csrf_token %}
                    <button type="submit" class="btn-modal btn-confirm" id="modalConfirmBtn">Confirmar</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        function filterHistory() {
            const input = document.getElementById('searchInput');
            const filter = input.value.toLowerCase();
            const cards = document.querySelectorAll('.history-card');
            
            cards.forEach(card => {
                const question = card.getAttribute('data-question');
                if (question && question.includes(filter)) {
                    card.style.display = '';
                } else {
                    card.style.display = 'none';
                }
            });
        }
        
        function configurarModal(btn) {
            console.log("Botão clicado! Configurando modal...");

            const modal = document.getElementById('modalUniversal');
            const form = document.getElementById('modalForm');
            const titulo = document.getElementById('modalTitle');
            const desc = document.getElementById('modalDesc');
            const confirmBtn = document.getElementById('modalConfirmBtn');

            const actionUrl = btn.getAttribute('data-action');
            const titleText = btn.getAttribute('data-title');
            const descText = btn.getAttribute('data-desc');
            const btnText = btn.getAttribute('data-btn-text');

            console.log("URL de ação:", actionUrl);

            form.action = actionUrl;
            titulo.innerText = titleText;
            desc.innerText = descText;
            confirmBtn.innerText = btnText;

            modal.classList.add('active');
        }
        
        window.configurarModal = configurarModal;

        function fecharModal() {
            const modal = document.getElementById('modalUniversal');
            modal.classList.remove('active');
        }

        document.getElementById('modalUniversal').addEventListener('click', function(e) {
            if (e.target === this) fecharModal();
        });
    </script>
</body>
</html>
