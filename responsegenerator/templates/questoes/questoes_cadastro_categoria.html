{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PonderSEC — Cadastrar Categoria</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">

<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    font-family: "Space Grotesk", system-ui, sans-serif;
    background: radial-gradient(circle at top, #051015 0, #02060b 45%, #000000 100%);
    color: #e5fef6;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
}

.background-grid {
    position: fixed;
    inset: 0;
    background-image: 
        linear-gradient(90deg, rgba(0, 255, 160, 0.06) 1px, transparent 1px),
        linear-gradient(180deg, rgba(0, 255, 160, 0.06) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.4;
    pointer-events: none;
}

.scanline {
    position: fixed;
    inset: 0;
    background: linear-gradient(to bottom, rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.15), rgba(0, 0, 0, 0.7));
    background-size: 100% 4px;
    opacity: 0.25;
    pointer-events: none;
}

.glow-orb {
    position: fixed;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0, 255, 160, 0.25), transparent 70%);
    top: -10%;
    right: -5%;
    filter: blur(80px);
    opacity: 0.6;
    pointer-events: none;
}

.container {
    position: relative;
    width: 100%;
    max-width: 600px;
    background: radial-gradient(circle at top, #0b141d 0, #050a11 55%, #020509 100%);
    border-radius: 18px;
    padding: 40px;
    box-shadow: 
        0 0 0 1px rgba(0, 255, 160, 0.25),
        0 18px 60px rgba(0, 0, 0, 0.9),
        0 0 40px rgba(0, 255, 160, 0.35);
    z-index: 2;
}

.product-name {
    text-align: center;
    color: #7df6c2;
    text-transform: uppercase;
    letter-spacing: 0.28em;
    font-size: 12px;
    margin-bottom: 6px;
}

.headline {
    text-align: center;
    color: #00ff9f;
    font-size: 26px;
    font-weight: 700;
    margin-bottom: 10px;
}

.subtitle {
    text-align: center;
    font-size: 14px;
    color: #8ba1b0;
    margin-bottom: 35px;
}

.form-group {
    margin-bottom: 25px;
}

label {
    display: block;
    font-size: 13px;
    margin-bottom: 8px;
    color: #7df6c2;
    text-transform: uppercase;
    letter-spacing: 0.05em;
}

input, textarea {
    width: 100%;
    padding: 12px 14px;
    background: #081018;
    border: 1px solid rgba(0, 255, 160, 0.25);
    border-radius: 8px;
    color: #e5fef6;
    font-size: 14px;
    outline: none;
    transition: 0.3s;
}

input:focus, textarea:focus {
    border-color: #00ff9f;
    box-shadow: 0 0 15px rgba(0, 255, 160, 0.3);
}

textarea {
    resize: vertical;
    min-height: 90px;
}

.btn-submit {
    width: 100%;
    padding: 14px;
    margin-top: 10px;
    background: linear-gradient(90deg, #00ff9f, #00d084);
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 700;
    font-size: 14px;
    color: #001a12;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    transition: 0.3s;
}

.btn-submit:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 20px rgba(0, 255, 160, 0.5);
}

.btn-back {
    width: 100%;
    padding: 12px;
    margin-top: 20px;
    background: rgba(0, 255, 160, 0.1);
    border: 1px solid rgba(0, 255, 160, 0.3);
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    color: #00ff9f;
    text-decoration: none;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    transition: 0.2s;
    display: block;
    text-align: center;
}

.btn-back:hover {
    background: rgba(0, 255, 160, 0.15);
    border-color: #00ff9f;
}

a{
    text-decoration: none;

}

</style>
</head>

<body>

<div class="background-grid"></div>
<div class="scanline"></div>
<div class="glow-orb"></div>

<div class="container">
    <div class="product-name">PonderSEC</div>
    <div class="headline">Cadastrar Nova Categoria</div>
    <div class="subtitle">Adicione uma nova categoria ao sistema</div>

    <form method="POST">
        {% csrf_token %}

        <div class="form-group">
            <label for="nome">Nome da Categoria</label>
            <input type="text" id="nome" name="nome" placeholder="Ex: Segurança de Rede" required>
        </div>

        <div class="form-group">
            <label for="descricao">Descrição</label>
            <textarea id="descricao" name="descricao" placeholder="Descreva brevemente a categoria..."></textarea>
        </div>

        <button type="submit" class="btn-submit">
            Salvar Categoria
        </button>
    </form>

    <a href="{% url 'add_questoes' %}" class="btn-back">Voltar</a>
</div>

</body>
</html>
