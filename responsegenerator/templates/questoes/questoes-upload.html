<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Upload de Arquivo</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">

<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    font-family: "Space Grotesk", system-ui, sans-serif;
    background: radial-gradient(circle at top, #051015 0, #02060b 45%, #000000 100%);
    color: #e5fef6;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
}

.background-grid {
    position: fixed;
    inset: 0;
    background-image:
        linear-gradient(90deg, rgba(0,255,160,0.06) 1px, transparent 1px),
        linear-gradient(180deg, rgba(0,255,160,0.06) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.4;
}

.scanline {
    position: fixed;
    inset: 0;
    background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.7),
        rgba(0,0,0,0.15),
        rgba(0,0,0,0.7)
    );
    background-size: 100% 4px;
    opacity: 0.25;
}

.glow-orb {
    position: fixed;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0,255,160,0.25), transparent 70%);
    top: -10%;
    right: -5%;
    filter: blur(80px);
    opacity: 0.6;
}

.container {
    position: relative;
    width: 100%;
    max-width: 500px;
    background: radial-gradient(circle at top left, #0b141d 0, #050a11 100%);
    border-radius: 16px;
    padding: 40px;
    border: 1px solid rgba(0,255,160,0.25);
    box-shadow:
        0 8px 30px rgba(0,0,0,0.6),
        0 0 20px rgba(0,255,160,0.15);
    z-index: 2;
}

h1 {
    color: #00ff9f;
    font-size: 26px;
    text-align: center;
    margin-bottom: 10px;
}

.subtitle {
    text-align: center;
    font-size: 14px;
    color: #8ba1b0;
    margin-bottom: 30px;
}

.drop-zone {
    border: 2px dashed rgba(0,255,160,0.4);
    border-radius: 12px;
    padding: 40px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.25s;
    background: rgba(0,255,160,0.03);
}

.drop-zone:hover,
.drop-zone.dragover {
    background: rgba(0,255,160,0.08);
    border-color: #00ff9f;
    box-shadow: 0 0 20px rgba(0,255,160,0.3);
}

.drop-zone p {
    color: #7df6c2;
    font-size: 15px;
}

.drop-zone span {
    display: block;
    margin-top: 8px;
    color: #6b7b8d;
    font-size: 13px;
}

input[type="file"] {
    display: none;
}

.file-name {
    margin-top: 15px;
    font-size: 14px;
    color: #00ff9f;
    text-align: center;
}

/* BOTÕES */

.actions {
    margin-top: 25px;
    display: flex;
    gap: 12px;
}

.actions button,
.actions a {
    flex: 1;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.button-primary {
    background: linear-gradient(90deg,#00ff9f,#00ff57);
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 700;
    color: #020509;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    transition: 0.2s;
    font-family: inherit;
}

.button-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 25px rgba(0,255,160,1);
}

.btn-back {
    background: rgba(0,255,160,0.1);
    border: 1px solid rgba(0,255,160,0.4);
    border-radius: 8px;
    cursor: pointer;
    font-weight: 700;
    color: #7df6c2;
    text-decoration: none;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    transition: 0.2s;
}

.btn-back:hover {
    background: rgba(0,255,160,0.15);
    border-color: #00ff9f;
    color: #00ff9f;
    transform: translateY(-2px);
}
</style>
</head>
<body>

<div class="background-grid"></div>
<div class="scanline"></div>
<div class="glow-orb"></div>

<div class="container">

    <h1>Upload de Arquivo</h1>

    <div class="subtitle">
        Envie um arquivo <b>.txt</b> ou <b>.json</b><br>
        Arraste ou clique para selecionar
    </div>

    <div class="drop-zone" id="dropZone">
        <p>Arraste o arquivo aqui</p>
        <span>ou clique para procurar</span>
        <input type="file" id="fileInput" accept=".txt,.json">
    </div>

    <div class="file-name" id="fileName"></div>

    <div class="actions">
        <button class="button-primary" onclick="uploadFile()">
            Enviar Arquivo
        </button>

        <a href="{% url 'questoes' %}" class="btn-back">
            Voltar
        </a>
    </div>

</div>

<script>
const dropZone = document.getElementById("dropZone");
const fileInput = document.getElementById("fileInput");
const fileName = document.getElementById("fileName");

dropZone.addEventListener("click", () => fileInput.click());

fileInput.addEventListener("change", () => {
    showFile(fileInput.files[0]);
});

dropZone.addEventListener("dragover", e => {
    e.preventDefault();
    dropZone.classList.add("dragover");
});

dropZone.addEventListener("dragleave", () => {
    dropZone.classList.remove("dragover");
});

dropZone.addEventListener("drop", e => {
    e.preventDefault();
    dropZone.classList.remove("dragover");

    const file = e.dataTransfer.files[0];
    fileInput.files = e.dataTransfer.files;
    showFile(file);
});

function showFile(file) {
    if (!file) return;

    const valid = file.name.endsWith(".txt") || file.name.endsWith(".json");

    if (!valid) {
        fileName.textContent = "Formato inválido.";
        fileName.style.color = "#ff4d4d";
        fileInput.value = "";
        return;
    }

    fileName.textContent = "Selecionado: " + file.name;
    fileName.style.color = "#00ff9f";
}

function uploadFile() {
    if (!fileInput.files.length) {
        alert("Selecione um arquivo primeiro.");
        return;
    }

    const file = fileInput.files[0];
    alert("Arquivo pronto para envio: " + file.name);
}
</script>

</body>
</html>
