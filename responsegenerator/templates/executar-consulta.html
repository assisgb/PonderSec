{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PonderSEC — Executar Consulta</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Space Grotesk", system-ui, sans-serif;
            background: radial-gradient(circle at top, #051015 0, #02060b 45%, #000000 100%);
            color: #e5fef6;
            min-height: 100vh;
            padding: 20px;
        }

        .background-grid {
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(90deg, rgba(0, 255, 160, 0.06) 1px, transparent 1px),
                linear-gradient(180deg, rgba(0, 255, 160, 0.06) 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.4;
            pointer-events: none;
        }

        .container {
            position: relative;
            max-width: 1200px;
            margin: 0 auto;
            z-index: 2;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            padding: 20px 25px;
            background: rgba(11, 20, 29, 0.6);
            border-radius: 14px;
            border: 1px solid rgba(0, 255, 160, 0.15);
        }

        .btn-back-header {
            padding: 12px 24px;
            background: rgba(0, 255, 160, 0.1);
            border: 1px solid rgba(0, 255, 160, 0.3);
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            color: #00ff9f;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .btn-back-header:hover {
            background: rgba(0, 255, 160, 0.15);
            border-color: #00ff9f;
        }

        .search-container {
            flex: 1;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 14px 20px;
            background: #050a11;
            border: 1px solid #1b2635;
            border-radius: 10px;
            color: #e5fef6;
            font-size: 15px;
            font-family: "Space Grotesk", system-ui, sans-serif;
            outline: none;
            transition: all 0.2s;
        }

        .search-input:focus {
            border-color: #00ff9f;
            box-shadow: 0 0 8px rgba(0, 255, 160, 0.3);
        }

        .btn-run {
            padding: 14px 32px;
            background: linear-gradient(90deg, #00ff9f, #00ff57);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 700;
            color: #020509;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            transition: all 0.2s;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-run:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(0, 255, 160, 0.6);
        }

        .btn-run:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .questions-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .question-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 18px 22px;
            background: rgba(11, 20, 29, 0.4);
            border: 1px solid rgba(0, 255, 160, 0.15);
            border-radius: 10px;
            transition: all 0.2s;
            cursor: pointer;
        }

        .question-item:hover {
            border-color: rgba(0, 255, 160, 0.3);
            background: rgba(11, 20, 29, 0.6);
        }

        .question-item.selected {
            border-color: #00ff9f;
            background: rgba(0, 255, 160, 0.08);
        }

        .checkbox {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(0, 255, 160, 0.5);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
            position: relative;
        }

        .checkbox.checked {
            background: #00ff9f;
            border-color: #00ff9f;
        }

        .checkbox.checked::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #020509;
            font-size: 14px;
            font-weight: bold;
        }

        .question-text {
            flex: 1;
            font-size: 15px;
            color: #e5fef6;
            line-height: 1.5;
        }

        .empty-state {
            text-align: center;
            padding: 80px 40px;
            background: rgba(0, 255, 160, 0.04);
            border: 2px dashed rgba(0, 255, 160, 0.25);
            border-radius: 16px;
        }

        .empty-icon {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.4;
        }

        .empty-text {
            font-size: 18px;
            color: #8ba1b0;
            margin-bottom: 10px;
        }

        .empty-subtext {
            font-size: 14px;
            color: #6b7b8d;
        }

        .loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .loading-overlay.active {
            display: flex;
        }

        .loading-content {
            text-align: center;
            padding: 40px;
            background: rgba(11, 20, 29, 0.95);
            border: 1px solid rgba(0, 255, 160, 0.3);
            border-radius: 16px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(0, 255, 160, 0.2);
            border-top-color: #00ff9f;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 18px;
            color: #00ff9f;
            font-weight: 600;
        }

        .alert {
            padding: 15px 20px;
            margin-bottom: 20px;
            border-radius: 10px;
            font-size: 14px;
            display: none;
        }

        .alert.show {
            display: block;
        }

        .alert-warning {
            background: rgba(255, 193, 7, 0.1);
            border: 1px solid rgba(255, 193, 7, 0.3);
            color: #ffc107;
        }

        .alert-error {
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid rgba(255, 0, 0, 0.3);
            color: #ff6b6b;
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 15px;
            }

            .btn-back-header,
            .btn-run {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="background-grid"></div>

    <div class="container">
        <div class="header">
            <a href="{% url 'menu-consulta' %}" class="btn-back-header">← Consulta</a>
            
            <div class="search-container">
                <input 
                    type="text" 
                    class="search-input" 
                    id="filterInput"
                    placeholder="Filtro de pesquisa..."
                    oninput="filterQuestions()"
                >
            </div>

            <button class="btn-run" id="btnRun" onclick="executeQuestions()">
                <span>▶</span>
                <span>Play RUN</span>
            </button>
        </div>

        <div id="alertContainer"></div>

        <div class="questions-list" id="questionsList">
            <!-- Perguntas serão carregadas aqui -->
        </div>

        <div class="empty-state" id="emptyState" style="display: none;">
            <div class="empty-icon">📋</div>
            <div class="empty-text">Nenhuma pergunta encontrada</div>
            <div class="empty-subtext">Adicione perguntas para executar consultas</div>
        </div>
    </div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-content">
            <div class="spinner"></div>
            <div class="loading-text">Executando consulta...</div>
        </div>
    </div>

    <script>
        // Dados de exemplo - substituir por dados do Django
        const questions = [
            { id: 1, text: "Como se proteger de phishing?" },
            { id: 2, text: "O que é SQL Injection?" },
            { id: 3, text: "Explique Cross-Site Scripting (XSS)" },
            { id: 4, text: "Como funciona autenticação de dois fatores?" },
            { id: 5, text: "O que são ataques de força bruta?" },
            { id: 6, text: "Como configurar firewall para segurança?" }
        ];

        let selectedQuestions = new Set();

        function renderQuestions(questionsToRender = questions) {
            const container = document.getElementById('questionsList');
            const emptyState = document.getElementById('emptyState');

            if (questionsToRender.length === 0) {
                container.style.display = 'none';
                emptyState.style.display = 'block';
                return;
            }

            container.style.display = 'flex';
            emptyState.style.display = 'none';

            container.innerHTML = questionsToRender.map(q => `
                <div class="question-item ${selectedQuestions.has(q.id) ? 'selected' : ''}" 
                     onclick="toggleQuestion(${q.id})"
                     data-id="${q.id}">
                    <div class="checkbox ${selectedQuestions.has(q.id) ? 'checked' : ''}"></div>
                    <div class="question-text">${q.text}</div>
                </div>
            `).join('');
        }

        function toggleQuestion(id) {
            if (selectedQuestions.has(id)) {
                selectedQuestions.delete(id);
            } else {
                selectedQuestions.add(id);
            }
            renderQuestions(getFilteredQuestions());
        }

        function getFilteredQuestions() {
            const filter = document.getElementById('filterInput').value.toLowerCase();
            if (!filter) return questions;
            
            return questions.filter(q => 
                q.text.toLowerCase().includes(filter)
            );
        }

        function filterQuestions() {
            const filtered = getFilteredQuestions();
            renderQuestions(filtered);

            if (filtered.length === 0 && document.getElementById('filterInput').value) {
                document.getElementById('emptyState').querySelector('.empty-text').textContent = 
                    'Sem resultados para o filtro';
            } else {
                document.getElementById('emptyState').querySelector('.empty-text').textContent = 
                    'Nenhuma pergunta encontrada';
            }
        }

        function showAlert(message, type = 'warning') {
            const container = document.getElementById('alertContainer');
            container.innerHTML = `
                <div class="alert alert-${type} show">
                    ${message}
                </div>
            `;

            setTimeout(() => {
                container.innerHTML = '';
            }, 3000);
        }

        function executeQuestions() {
            if (selectedQuestions.size === 0) {
                showAlert('⚠️ Selecione pelo menos uma pergunta para executar a consulta');
                return;
            }

            const btnRun = document.getElementById('btnRun');
            const loadingOverlay = document.getElementById('loadingOverlay');

            // Desabilita botão
            btnRun.disabled = true;

            // Mostra loading
            loadingOverlay.classList.add('active');

            // Simula execução (substituir por chamada real)
            setTimeout(() => {
                loadingOverlay.classList.remove('active');
                btnRun.disabled = false;

                // Redirecionar para resultados
                // Colocar o resultado_consultas aqui
                
                alert(`Consulta executada com sucesso! ${selectedQuestions.size} pergunta(s) processada(s).`);
            }, 2000);
        }

        // Renderizar ao carregar
        renderQuestions();
    </script>
</body>
</html>
