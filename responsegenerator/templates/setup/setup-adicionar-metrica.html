{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PonderSEC — Adicionar Métrica</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: "Space Grotesk", system-ui, sans-serif;
            background: radial-gradient(circle at top, #051015 0, #02060b 45%, #000000 100%);
            color: #e5fef6; min-height: 100vh;
            display: flex; align-items: center; justify-content: center; padding: 20px;
        }

        .background-grid {
            position: fixed; inset: 0;
            background-image:
                linear-gradient(90deg, rgba(0,255,160,0.06) 1px, transparent 1px),
                linear-gradient(180deg, rgba(0,255,160,0.06) 1px, transparent 1px);
            background-size: 40px 40px; opacity: 0.4; pointer-events: none;
        }

        .scanline {
            position: fixed; inset: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7), rgba(0,0,0,0.15), rgba(0,0,0,0.7));
            background-size: 100% 4px; opacity: 0.25; pointer-events: none;
        }

        .glow-orb {
            position: fixed; width: 600px; height: 600px; border-radius: 50%;
            background: radial-gradient(circle, rgba(0,255,160,0.15), transparent 70%);
            top: -15%; right: -10%; filter: blur(100px); opacity: 0.8; pointer-events: none;
        }

        .container {
            position: relative; width: 100%; max-width: 700px; z-index: 2;
        }

        .header {
            display: flex; align-items: center; gap: 20px;
            margin-bottom: 28px; padding: 26px 32px;
            background: radial-gradient(circle at top, #0b141d 0, #050a11 55%, #020509 100%);
            border-radius: 18px;
            box-shadow: 0 0 0 1px rgba(0,255,160,0.15), 0 20px 60px rgba(0,0,0,0.8);
        }

        .logo img {
            width: 60px; border-radius: 11px;
            filter: drop-shadow(0 0 10px rgba(0,255,160,0.6));
        }

        .header-text { flex: 1; }

        .product-name {
            color: #4ecf9a; text-transform: uppercase;
            letter-spacing: 0.3em; font-size: 10px; font-weight: 600; margin-bottom: 3px;
        }

        .page-title {
            color: #00ff9f; font-size: 24px; font-weight: 700;
            text-shadow: 0 0 24px rgba(0,255,160,0.3);
        }

        .btn-back {
            padding: 10px 22px;
            background: rgba(0,255,160,0.08);
            border: 1px solid rgba(0,255,160,0.2);
            border-radius: 9px; cursor: pointer;
            font-size: 12px; font-weight: 700; color: #00ff9f;
            text-decoration: none; text-transform: uppercase;
            letter-spacing: 0.08em; transition: all 0.2s;
            display: flex; align-items: center; gap: 6px;
        }

        .btn-back:hover { background: rgba(0,255,160,0.14); border-color: rgba(0,255,160,0.4); }

        .form-card {
            background: radial-gradient(circle at top, #0b141d 0, #050a11 55%, #020509 100%);
            border: 1px solid rgba(0,255,160,0.12);
            border-radius: 18px; padding: 32px 36px;
            box-shadow: 0 0 0 1px rgba(0,255,160,0.06), 0 20px 60px rgba(0,0,0,0.7);
        }

        .section-label {
            font-size: 10px; color: #4ecf9a; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.25em;
            margin-bottom: 20px; display: flex; align-items: center; gap: 12px;
        }

        .section-label::after {
            content: ''; flex: 1; height: 1px;
            background: linear-gradient(to right, rgba(0,255,160,0.2), transparent);
        }

        .field-group { margin-bottom: 20px; }

        .field-label {
            display: block; color: #7df6c2; font-size: 11px;
            font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.1em; margin-bottom: 8px;
        }

        .field-input {
            width: 100%; padding: 12px 16px;
            background: #050a11; border: 1px solid #1b2635;
            border-radius: 10px; color: #e5fef6; font-size: 14px;
            font-family: "Space Grotesk", system-ui, sans-serif;
            outline: none; transition: border-color 0.2s, box-shadow 0.2s;
        }

        .field-input:focus {
            border-color: rgba(0,255,160,0.4);
            box-shadow: 0 0 10px rgba(0,255,160,0.08);
        }

        .field-input::placeholder { color: #2a3848; }

        textarea.field-input { resize: vertical; min-height: 80px; }

        /* Radio group estilizado */
        .radio-group { display: flex; gap: 12px; }

        .radio-option input[type="radio"] { display: none; }

        .radio-option label {
            display: flex; align-items: center; gap: 8px;
            padding: 10px 18px;
            background: #050a11; border: 1px solid #1b2635;
            border-radius: 9px; cursor: pointer;
            font-size: 13px; color: #8ba1b0;
            transition: all 0.2s; font-weight: 600;
        }

        .radio-option label:hover {
            border-color: rgba(0,255,160,0.3);
            color: #e5fef6;
        }

        .radio-option input:checked + label {
            border-color: rgba(0,255,160,0.5);
            background: rgba(0,255,160,0.07);
            color: #00ff9f;
        }

        .radio-dot {
            width: 14px; height: 14px; border-radius: 50%;
            border: 2px solid #1b2635; flex-shrink: 0;
            transition: all 0.2s;
        }

        .radio-option input:checked + label .radio-dot {
            border-color: #00ff9f;
            background: #00ff9f;
            box-shadow: 0 0 8px rgba(0,255,160,0.5);
        }

        .footer { display: flex; justify-content: flex-end; gap: 12px; margin-top: 28px; }

        .btn-cancel {
            padding: 12px 26px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 10px; cursor: pointer;
            font-size: 13px; font-weight: 700; color: #8ba1b0;
            text-decoration: none; text-transform: uppercase;
            letter-spacing: 0.08em; transition: all 0.2s;
            font-family: "Space Grotesk", system-ui, sans-serif;
        }

        .btn-cancel:hover { background: rgba(255,255,255,0.08); color: #e5fef6; }

        .btn-submit {
            padding: 12px 32px;
            background: rgba(0,255,160,0.12);
            border: 1px solid rgba(0,255,160,0.3);
            border-radius: 10px; cursor: pointer;
            font-size: 13px; font-weight: 700; color: #00ff9f;
            text-transform: uppercase; letter-spacing: 0.08em;
            transition: all 0.2s;
            font-family: "Space Grotesk", system-ui, sans-serif;
        }

        .btn-submit:hover {
            background: rgba(0,255,160,0.2);
            border-color: rgba(0,255,160,0.6);
            box-shadow: 0 0 20px rgba(0,255,160,0.15);
        }
    </style>
</head>
<body>
    <div class="background-grid"></div>
    <div class="scanline"></div>
    <div class="glow-orb"></div>

    <div class="container">
        <div class="header">
            <div class="logo">
                <img src="{% static 'pondersec_logo.jpg' %}" alt="PonderSEC">
            </div>
            <div class="header-text">
                <div class="product-name">PonderSEC</div>
                <div class="page-title">Adicionar Métrica</div>
            </div>
            <a href="{% url 'setup_avaliacao' %}" class="btn-back">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                    <path d="M19 12H5M11 6l-6 6 6 6"/>
                </svg>
                Voltar
            </a>
        </div>

        <div class="form-card">
            <div class="section-label">Nova Métrica</div>

            <form method="POST" action="{% url 'setup_adicionar_metrica' %}" novalidate>
                {% csrf_token %}

                <div class="field-group">
                    <label class="field-label">Nome da Métrica</label>
                    <input type="text" name="nome" class="field-input" placeholder="Ex: Acurácia, Clareza...">
                </div>

                <div class="field-group">
                    <label class="field-label">Descrição</label>
                    <input type="text" name="descricao" class="field-input" placeholder="Descreva o que esta métrica avalia">
                </div>

                <div class="field-group">
                    <label class="field-label">Tipo de Métrica</label>
                    <div class="radio-group">
                        <div class="radio-option">
                            <input type="radio" name="tipo" id="tipo_quanti" value="quantitativa">
                            <label for="tipo_quanti">
                                <span class="radio-dot"></span>
                                Quantitativa
                            </label>
                        </div>
                        <div class="radio-option">
                            <input type="radio" name="tipo" id="tipo_quali" value="qualitativa">
                            <label for="tipo_quali">
                                <span class="radio-dot"></span>
                                Qualitativa
                            </label>
                        </div>
                    </div>
                </div>

                <div class="field-group">
                    <label class="field-label">Pontuação Máxima</label>
                    <input type="number" name="pontuacao_maxima" class="field-input" min="1" placeholder="Ex: 10">
                </div>

                <div class="field-group">
                    <label class="field-label">Critério de Avaliação</label>
                    <textarea name="criterio_texto" class="field-input" rows="3" placeholder="Descreva os critérios para avaliar esta métrica..."></textarea>
                </div>

                <div class="footer">
                    <a href="{% url 'setup_avaliacao' %}" class="btn-cancel">Cancelar</a>
                    <button type="submit" class="btn-submit">Adicionar Métrica</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
