{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PonderSEC — Setup</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Space Grotesk", system-ui, sans-serif;
            background: radial-gradient(circle at top, #051015 0, #02060b 45%, #000000 100%);
            color: #e5fef6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .background-grid {
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(90deg, rgba(0, 255, 160, 0.06) 1px, transparent 1px),
                linear-gradient(180deg, rgba(0, 255, 160, 0.06) 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.4;
            pointer-events: none;
        }

        .scanline {
            position: fixed;
            inset: 0;
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.15), rgba(0, 0, 0, 0.7));
            background-size: 100% 4px;
            opacity: 0.25;
            pointer-events: none;
        }

        .glow-orb {
            position: fixed;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 255, 160, 0.25), transparent 70%);
            top: -10%;
            right: -5%;
            filter: blur(80px);
            opacity: 0.6;
            pointer-events: none;
        }

        .container {
            position: relative;
            width: 100%;
            max-width: 700px;
            background: radial-gradient(circle at top, #0b141d 0, #050a11 55%, #020509 100%);
            border-radius: 18px;
            padding: 35px 40px;
            box-shadow: 
                0 0 0 1px rgba(0, 255, 160, 0.25),
                0 18px 60px rgba(0, 0, 0, 0.9),
                0 0 40px rgba(0, 255, 160, 0.35);
            z-index: 2;
        }

        .logo {
            text-align: center;
            margin-bottom: 12px;
        }

        .logo img {
            width: 120px;
            border-radius: 10px;
            filter: drop-shadow(0 0 10px rgba(0, 255, 160, 0.8));
        }

        .product-name {
            text-align: center;
            color: #7df6c2;
            text-transform: uppercase;
            letter-spacing: 0.28em;
            font-size: 12px;
            margin-bottom: 5px;
        }

        .headline {
            text-align: center;
            color: #00ff9f;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .subtitle {
            text-align: center;
            font-size: 13px;
            color: #8ba1b0;
            margin-bottom: 28px;
        }

        .search-bar {
            position: relative;
            margin-bottom: 28px;
        }

        .search-input {
            width: 100%;
            padding: 14px 18px 14px 45px;
            background: #050a11;
            border: 1px solid #1b2635;
            border-radius: 10px;
            color: #e5fef6;
            font-size: 15px;
            font-family: "Space Grotesk", system-ui, sans-serif;
            outline: none;
            transition: all 0.2s;
        }

        .search-input::placeholder {
            color: #6b7b8d;
        }

        .search-input:focus {
            border-color: #00ff9f;
            box-shadow: 0 0 16px rgba(0, 255, 160, 0.5);
        }

        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #7df6c2;
            font-size: 18px;
        }

        .filter-label {
            font-size: 13px;
            color: #a7bbc8;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 12px;
        }

        .filter-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 28px;
        }

        .filter-btn {
            padding: 18px 25px;
            background: radial-gradient(circle at top left, #0b141d 0, #050a11 100%);
            border: 1px solid rgba(0, 255, 160, 0.25);
            border-radius: 12px;
            color: #00ff9f;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .filter-btn:hover {
            border-color: #00ff9f;
            box-shadow: 0 0 25px rgba(0, 255, 160, 0.4);
            transform: translateY(-3px);
            background: radial-gradient(circle at top left, #0d1823 0, #060b12 100%);
        }

        .dropdown-select {
            width: 100%;
            padding: 14px 18px;
            background: #050a11;
            border: 1px solid #1b2635;
            border-radius: 10px;
            color: #e5fef6;
            font-size: 14px;
            font-family: "Space Grotesk", system-ui, sans-serif;
            outline: none;
            cursor: pointer;
            transition: all 0.2s;
        }

        .dropdown-select:focus {
            border-color: #00ff9f;
            box-shadow: 0 0 12px rgba(0, 255, 160, 0.5);
        }

        .btn-back {
            width: 100%;
            padding: 12px;
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid rgba(255, 0, 0, 0.3);
            border-radius: 999px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            color: #ff6b6b;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            transition: all 0.2s;
            display: block;
            text-align: center;
            margin-top: 20px;
        }

        .btn-back:hover {
            background: rgba(255, 0, 0, 0.2);
            border-color: #ff6b6b;
            transform: translateY(-2px);
        }

        @media (max-width: 768px) {
            .filter-options {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="background-grid"></div>
    <div class="scanline"></div>
    <div class="glow-orb"></div>

    <div class="container">
        <div class="logo">
            <img src="{% static 'pondersec_logo.jpg' %}" alt="PonderSEC Logo">
        </div>
        <div class="product-name">PONDERSEC</div>
        <div class="headline">Setup</div>
        <div class="subtitle">Configure os parâmetros do sistema</div>

        <div class="search-bar">
            <span class="search-icon">🔎</span>
            <input 
                type="text" 
                class="search-input" 
                placeholder="Buscar configurações..."
            >
        </div>

        <div class="filter-label">Padrão</div>
        <select class="dropdown-select" style="margin-bottom: 28px;">
            <option value="">Selecione um padrão</option>
            <option value="padrao1">Padrão 1</option>
            <option value="padrao2">Padrão 2</option>
            <option value="padrao3">Padrão 3</option>
            <option value="personalizado">Personalizado</option>
        </select>

        <div class="filter-label">Configurações</div>
        <div class="filter-options">
            <a href="{% url 'setup_llm' %}" class="filter-btn">LLM</a>
            <a href="{% url 'setup_avaliacao' %}" class="filter-btn">Tipo de Avaliação</a>
        </div>

        <a href="{% url 'menu' %}" class="btn-back">Voltar ao Menu</a>
    </div>
</body>
</html>
