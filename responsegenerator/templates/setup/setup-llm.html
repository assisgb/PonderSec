{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PonderSEC — LLM</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:"Space Grotesk",system-ui,sans-serif;
background:radial-gradient(circle at top,#051015 0,#02060b 45%,#000000 100%);
color:#e5fef6;
min-height:100vh;
padding:20px;
}

.background-grid{
position:fixed;
inset:0;
background-image:
linear-gradient(90deg,rgba(0,255,160,0.06) 1px,transparent 1px),
linear-gradient(180deg,rgba(0,255,160,0.06) 1px,transparent 1px);
background-size:40px 40px;
opacity:.4;
pointer-events:none;
}

.scanline{
position:fixed;
inset:0;
background:linear-gradient(to bottom,rgba(0,0,0,.7),rgba(0,0,0,.15),rgba(0,0,0,.7));
background-size:100% 4px;
opacity:.25;
pointer-events:none;
}

.glow-orb{
position:fixed;
width:500px;
height:500px;
border-radius:50%;
background:radial-gradient(circle,rgba(0,255,160,.25),transparent 70%);
top:-10%;
right:-5%;
filter:blur(80px);
opacity:.6;
pointer-events:none;
}

.container{
position:relative;
max-width:1000px;
margin:auto;
z-index:2;
}

.header{
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:30px;
padding:25px 30px;
background:radial-gradient(circle at top left,#0b141d 0,#050a11 100%);
border-radius:16px;
border:1px solid rgba(0,255,160,.25);
box-shadow:0 8px 30px rgba(0,0,0,.6);
}

.logo-section{
display:flex;
align-items:center;
gap:18px;
}

.logo-section img{
width:70px;
height:70px;
border-radius:10px;
filter:drop-shadow(0 0 15px rgba(0,255,160,.8));
}

.header-title{
display:flex;
flex-direction:column;
gap:4px;
}

.product-name{
color:#7df6c2;
text-transform:uppercase;
letter-spacing:.25em;
font-size:11px;
font-weight:600;
}

.page-title{
color:#00ff9f;
font-size:26px;
font-weight:700;
}

.btn-back{
padding:12px 28px;
background:linear-gradient(90deg,#00ff9f,#00ff57);
border:none;
border-radius:999px;
cursor:pointer;
font-size:14px;
font-weight:700;
color:#020509;
text-transform:uppercase;
letter-spacing:.08em;
transition:.2s;
}

.btn-back:hover{
transform:translateY(-2px);
box-shadow:0 0 25px rgba(0,255,160,1);
}

.toolbar{
display:flex;
gap:15px;
margin-bottom:25px;
}

.search-bar{
position:relative;
flex:1;
}

.search-input{
width:100%;
padding:14px 18px 14px 45px;
background:#050a11;
border:1px solid #1b2635;
border-radius:10px;
color:#e5fef6;
font-size:15px;
outline:none;
}

.search-input:focus{
border-color:#00ff9f;
box-shadow:0 0 16px rgba(0,255,160,.5);
}

.search-icon{
position:absolute;
left:16px;
top:50%;
transform:translateY(-50%);
color:#7df6c2;
font-size:18px;
}

.btn-add{
padding:14px 28px;
background:linear-gradient(90deg,#00ff9f,#00ff57);
border:none;
border-radius:10px;
cursor:pointer;
font-size:15px;
font-weight:700;
color:#020509;
letter-spacing:.08em;
transition:.2s;
}

.btn-add:hover{
transform:translateY(-2px);
box-shadow:0 0 25px rgba(0,255,160,1);
}
a{
    text-decoration: none;
}

/* ---------- MODAL ---------- */

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.75);
backdrop-filter:blur(6px);
z-index:1000;

justify-content:center;
align-items:center;
}

.modal-content{
width:100%;
max-width:600px;

background:radial-gradient(circle at top left,#0b141d 0,#050a11 100%);
border:1px solid rgba(0,255,160,.25);
border-radius:16px;

box-shadow:
0 0 40px rgba(0,255,160,.15),
0 8px 30px rgba(0,0,0,.8);

padding:35px;
display:flex;
flex-direction:column;
gap:25px;

animation:modalFade .25s ease;
}

.modal-editar{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.75);
backdrop-filter:blur(6px);
z-index:1000;

justify-content:center;
align-items:center;
}

.modal-editar-content{
width:100%;
max-width:600px;

background:radial-gradient(circle at top left,#0b141d 0,#050a11 100%);
border:1px solid rgba(0,255,160,.25);
border-radius:16px;

box-shadow:
0 0 40px rgba(0,255,160,.15),
0 8px 30px rgba(0,0,0,.8);

padding:35px;
display:flex;
flex-direction:column;
gap:25px;

animation:modalFade .25s ease;
}

.config-card{
display:flex;
flex-direction:column;
gap:20px;
}

.form-group{
display:flex;
flex-direction:column;
gap:6px;
}

label{
font-size:13px;
color:#7df6c2;
}

input,select{
padding:14px;
background:#050a11;
border:1px solid #1b2635;
border-radius:10px;
color:#e5fef6;
font-size:14px;
}

input:focus,select:focus{
border-color:#00ff9f;
box-shadow:0 0 15px rgba(0,255,160,.5);
}

.btn-save{
padding:16px;
background:linear-gradient(90deg,#00ff9f,#00ff57);
border:none;
border-radius:12px;
font-weight:700;
cursor:pointer;
color:#020509;
letter-spacing:.1em;
}

.btn-save:hover{
transform:translateY(-2px);
box-shadow:0 0 25px rgba(0,255,160,1);
}

@keyframes modalFade{
from{
opacity:0;
transform:translateY(-15px) scale(.97);
}
to{
opacity:1;
transform:translateY(0) scale(1);
}
}
.history-grid {
            display: grid;
            gap: 18px;
        
        }
        
        .history-card {
    background: rgba(11, 20, 29, 0.4);
    border: 1px solid rgba(0, 255, 160, 0.15);
    border-radius: 12px;
    padding: 24px 28px;
    transition: all 0.2s;

    display: flex;
    justify-content: space-between;
    align-items: center;
}

        .history-card:hover {
            border-color: rgba(0, 255, 160, 0.3);
            background: rgba(11, 20, 29, 0.6);
            transform: translateX(4px);
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

</style>
</head>

<body>

<div class="background-grid"></div>
<div class="scanline"></div>
<div class="glow-orb"></div>

<div class="container">

<div class="header">

<div class="logo-section">
<img src="{% static 'pondersec_logo.jpg' %}">
<div class="header-title">
<div class="product-name">PONDERSEC</div>
<div class="page-title">Gerenciar LLMs</div>
</div>
</div>

<a href="{% url 'setup' %}" class="btn-back">Voltar</a>

</div>


<div class="toolbar">

<div class="search-bar">
<span class="search-icon">🔎</span>
<input class="search-input" placeholder="Buscar LLM...">
</div>

<button class="btn-add" onclick="abrirModal()">+ Adicionar</button>

</div>

<div class="history-grid">
{% if llms_cadastradas %}
    {% for llm in llms_cadastradas %}
    <div class="history-card" id="llm-{{ llm.id }}">
    <div class="llm-name" id="llm-nome-{{ llm.id }}">{{ llm.nome }}</div>
    <div>
    <button class="btn-icon btn-save" onclick="deletarLLM({{llm.id}})">
        🗑️
    </button>
    <button class="btn-save" onclick="editarLLM({{ llm.id }}, '{{ llm.nome|escapejs }}', '{{ llm.api_key|escapejs }}')">
       ✏️
    </button>
    </div>
    </div>

    {%endfor%}



</div>
    
{% endif %}
</div>

</div>

<div class="modal-editar" id="modal-editar">

<div class="modal-editar-content">

<div class="page-title">Editar LLM</div>

<input type="hidden" id="edit-id">

<label>Modelo</label>
<input type="text" id="edit-nome">


<label>Chave de API</label>
<input type="text" id="edit-apikey">

<button class="btn-add" onclick="salvarEdicao()">Salvar</button>
<button class="btn-back" onclick="sairEdicao()">Sair</button>


</div>
</div>










<!-- MODAL -->

<div class="modal" id="modal">

<div class="modal-content">

<div class="page-title">Adicionar LLM</div>

<form method="POST">

{% csrf_token %}

<div class="config-card">

<div class="form-group">
<label>Provedor</label>
<select name="provider">
<option value="">Selecione</option>
<option>OpenAI</option>
<option>Anthropic</option>
<option>Groq</option>
<option>Local</option>
</select>
</div>

<div class="form-group">
<label>Modelo</label>
<input type="text" name="model" placeholder="Ex: gpt-4o-mini">
</div>

<div class="form-group">
<label>API Key</label>
<input type="password" name="apiKey">
</div>

<button class="btn-save" type="submit">ADICIONAR MODELO</button>

<button type="button" class="btn-back" onclick="fecharModal()">Cancelar</button>

</div>

</form>

</div>

</div>




<script>



function editarLLM(id, nome, api_key){
    document.getElementById("edit-id").value = id
    document.getElementById("edit-nome").value = nome
    document.getElementById("modal-editar").style.display = "flex"
    document.getElementById("edit-apikey").value = api_key

}

function salvarEdicao(){

    const id = document.getElementById("edit-id").value
    const nome = document.getElementById("edit-nome").value
    const api_key = document.getElementById("edit-apikey").value

    fetch(`/api/llm/${id}/edit/`, {

        method: "PUT",

        headers:{
            "Content-Type":"application/json",
            "X-CSRFToken": getCSRFToken()
        },

        body: JSON.stringify({
            nome: nome,
            api_key: api_key
        })

    })
    .then(res => res.json())
    .then(data => {

        if(data.status === "success"){

            const elemento = document.getElementById(`llm-nome-${id}`)

            if(elemento){
                elemento.innerText = nome
            }

            document.getElementById("modal-editar").style.display = "none"

        }

    })

}


function sairEdicao(){
document.getElementById("modal-editar").style.display="none"
}


function deletarLLM(id)
{
    fetch(`/api/llm/${id}/delete/`, {

        method: "DELETE",
        headers: {
            "X-CSRFToken": getCSRFToken()
        }
    })
    .then(response => response.json())
    .then(data => {

        if(data.status === "success"){

            const card = document.getElementById(`llm-${id}`)

            if(card){
                card.remove()
            }

        }

    })



}
function getCSRFToken(){

    return document.querySelector('[name=csrfmiddlewaretoken]').value

}

function abrirModal(){
document.getElementById("modal").style.display="flex"
}

function fecharModal(){
document.getElementById("modal").style.display="none"
}

window.onclick=function(event){
const modal=document.getElementById("modal")
if(event.target==modal){
modal.style.display="none"
}
}

</script>

</body>
</html>
