{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PonderSEC — LLM</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: "Space Grotesk", system-ui, sans-serif;
            background: radial-gradient(circle at top, #051015 0, #02060b 45%, #000000 100%);
            color: #e5fef6;
            min-height: 100vh;
            padding: 20px;
        }

        .background-grid {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(90deg, rgba(0,255,160,0.06) 1px, transparent 1px),
                linear-gradient(180deg, rgba(0,255,160,0.06) 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.4;
            pointer-events: none;
        }

        .scanline {
            position: fixed;
            inset: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7), rgba(0,0,0,0.15), rgba(0,0,0,0.7));
            background-size: 100% 4px;
            opacity: 0.25;
            pointer-events: none;
        }

        .container {
            position: relative;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 35px;
            padding: 30px 35px;
            background: rgba(11,20,29,0.6);
            border-radius: 16px;
            border: 1px solid rgba(0,255,160,0.15);
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 22px;
        }

        .logo-section img {
            width: 85px;
            height: 85px;
            border-radius: 12px;
        }

        .header-title {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .product-name {
            color: #7df6c2;
            text-transform: uppercase;
            letter-spacing: 0.25em;
            font-size: 12px;
            font-weight: 600;
        }

        .page-title {
            color: #00ff9f;
            font-size: 28px;
            font-weight: 600;
        }

        a { text-decoration: none; }

        .btn-back {
            padding: 12px 28px;
            background: rgba(0,255,160,0.1);
            border: 1px solid rgba(0,255,160,0.3);
            border-radius: 8px;
            color: #00ff9f;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
            cursor: pointer;
            font-family: "Space Grotesk", system-ui, sans-serif;
            font-size: 14px;
        }

        .btn-back:hover {
            background: rgba(0,255,160,0.15);
            border-color: #00ff9f;
            transform: translateY(-1px);
        }

        /* Section */
        .metrics-section {
            padding: 30px;
            background: rgba(11,20,29,0.5);
            border-radius: 12px;
            border: 1px solid rgba(0,255,160,0.2);
            margin-bottom: 30px;
        }

        /* Grid de cards */
        .history-grid {
            display: grid;
            gap: 18px;
        }

        .history-card {
            background: rgba(11,20,29,0.4);
            border: 1px solid rgba(0,255,160,0.15);
            border-radius: 10px;
            padding: 20px 24px;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .history-card:hover {
            border-color: rgba(0,255,160,0.3);
            background: rgba(11,20,29,0.6);
            transform: translateX(4px);
        }

        .llm-name {
            font-size: 15px;
            font-weight: 500;
            color: #e5fef6;
        }

        /* Botões de ação */
        .btn-add,
        .btn-save,
        .btn-delete {
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-family: "Space Grotesk", system-ui, sans-serif;
            font-size: 14px;
            transition: all 0.3s;
        }

        .btn-add {
            background: rgba(0,255,160,0.15);
            border: 1px solid rgba(0,255,160,0.4);
            color: #00ff9f;
            margin-bottom: 15px;
        }

        .btn-add:hover {
            background: rgba(0,255,160,0.15);
            border-color: #00ff9f;
            transform: translateY(-1px);
        }

        .btn-save {
            background: rgba(0,255,160,0.1);
            border: 1px solid rgba(0,255,160,0.3);
            color: #00ff9f;
            margin-left: 8px;
        }

        .btn-save:hover {
            background: rgba(0,255,160,0.15);
            border-color: #00ff9f;
            transform: translateY(-1px);
        }

        .btn-delete {
            background: rgba(255,0,0,0.1);
            border: 1px solid rgba(255,0,0,0.3);
            color: #ff6b6b;
        }

        .btn-delete:hover {
            background: rgba(255,0,0,0.15);
            border-color: #ff6b6b;
            transform: translateY(-1px);
        }

        /* Modal */
        .modal,
        .modal-editar {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(6px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content,
        .modal-editar-content {
            width: 100%;
            max-width: 600px;
            background: rgba(11,20,29,0.6);
            border: 1px solid rgba(0,255,160,0.15);
            border-radius: 16px;
            box-shadow: 0 0 40px rgba(0,255,160,0.15), 0 8px 30px rgba(0,0,0,0.8);
            padding: 35px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            animation: modalFade 0.25s ease;
        }

        @keyframes modalFade {
            from { opacity: 0; transform: translateY(-15px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Formulários */
        .config-card {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-size: 13px;
            color: #7df6c2;
        }

        input,
        select {
            width: 100%;
            padding: 10px;
            background: #050a11;
            border: 1px solid #1b2635;
            border-radius: 6px;
            color: #e5fef6;
            font-family: "Space Grotesk", system-ui, sans-serif;
            font-size: 14px;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: #00ff9f;
            box-shadow: 0 0 10px rgba(0,255,160,0.3);
        }

        /* Password toggle */
        .password-container {
            position: relative;
            display: flex;
            align-items: center;
        }

        .password-container input {
            padding-right: 45px;
        }

        .btn-toggle-password {
            position: absolute;
            right: 12px;
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 16px;
            color: #7df6c2;
            opacity: 0.6;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 5px;
        }

        .btn-toggle-password:hover {
            opacity: 1;
            transform: scale(1.1);
        }
    </style>
</head>

<body>

    <div class="background-grid"></div>
    <div class="scanline"></div>

    <div class="container">

        <div class="header">
            <div class="logo-section">
                <img src="{% static 'pondersec_logo.jpg' %}">
                <div class="header-title">
                    <div class="product-name">PONDERSEC</div>
                    <div class="page-title">Gerenciar LLMs</div>
                </div>
            </div>
            <a href="{% url 'setup' %}" class="btn-back">Voltar</a>
        </div>

        <button class="btn-add" onclick="abrirModal()">+ Adicionar</button>

        <div class="history-grid">
            {% if llms_cadastradas %}
                {% for llm in llms_cadastradas %}
                <div class="history-card" id="llm-{{ llm.id }}">
                    <div class="llm-name" id="llm-nome-{{ llm.id }}">{{ llm.nome }}</div>
                    <div>
                        <button class="btn-delete" onclick="deletarLLM({{ llm.id }})">🗑️</button>
                        <button class="btn-save" onclick="editarLLM({{ llm.id }}, '{{ llm.nome|escapejs }}', '{{ llm.api_key|escapejs }}')">✏️</button>
                    </div>
                </div>
                {% endfor %}
            {% endif %}
        </div>

    </div>

    <!-- MODAL ADICIONAR -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="page-title">Adicionar LLM</div>

            <form method="POST">
                {% csrf_token %}
                <div class="config-card">

                    <div class="form-group">
                        <label>Provedor</label>
                        <select name="provider" id="providerSelect" onchange="atualizarModelos()">
                            <option value="">Selecione</option>
                            <option value="OpenAI">OpenAI</option>
                            <option value="Anthropic">Anthropic</option>
                            <option value="Groq">Groq</option>
                            <option value="DeepSeek">DeepSeek</option>
                            <option value="Gemini">Gemini</option>
                            <option value="Local">Local</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Modelo</label>
                        <select name="model" id="modelSelect">
                            <option value="">Selecione um provedor primeiro</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>API Key</label>
                        <div class="password-container">
                            <input type="password" name="apiKey" id="apiKeyInput" placeholder="Cole sua chave aqui...">
                            <button type="button" class="btn-toggle-password" onclick="togglePassword('apiKeyInput', this)">👁️</button>
                        </div>
                    </div>

                    <button class="btn-add" type="submit">Adicionar Modelo</button>
                    <button type="button" class="btn-back" onclick="fecharModal()">Cancelar</button>

                </div>
            </form>
        </div>
    </div>

    <!-- MODAL EDITAR -->
    <div class="modal-editar" id="modal-editar">
        <div class="modal-editar-content">
            <div class="page-title">Editar LLM</div>

            <input type="hidden" id="edit-id">

            <div class="form-group">
                <label>Provedor</label>
                <select id="edit-provider" onchange="atualizarModelosEdicao()">
                    <option value="Selecione">Selecione</option>
                    <option value="OpenAI">OpenAI</option>
                    <option value="Anthropic">Anthropic</option>
                    <option value="Groq">Groq</option>
                    <option value="DeepSeek">DeepSeek</option>
                    <option value="Gemini">Gemini</option>
                    <option value="Local">Local</option>
                </select>
            </div>

            <div class="form-group">
                <label>Modelo</label>
                <select id="edit-model">
                    <option value="">Selecione um provedor primeiro</option>
                </select>
            </div>

            <div class="form-group">
                <label>API Key</label>
                <div class="password-container">
                    <input type="password" id="edit-apikey">
                    <button type="button" class="btn-toggle-password" onclick="togglePassword('edit-apikey', this)">👁️</button>
                </div>
            </div>

            <button class="btn-save" onclick="salvarEdicao()">Salvar</button>
            <button class="btn-back" onclick="sairEdicao()">Cancelar</button>
        </div>
    </div>


    <script>
        const modelosPorProvedor = {
            "OpenAI": [
                { value: "gpt-4o-mini", label: "GPT-4o Mini" },
                { value: "gpt-4o", label: "GPT-4o" }
            ],
            "Anthropic": [
                { value: "claude-3-5-sonnet-20240620", label: "Claude 3.5 Sonnet" },
                { value: "claude-3-haiku-20240307", label: "Claude 3 Haiku" }
            ],
            "Groq": [
                { value: "llama-3.3-70b-versatile", label: "Llama 3.3 70B (Versatile)" },
                { value: "mixtral-8x7b-32768", label: "Mixtral 8x7B" }
            ],
            "Gemini": [
                { value: "gemini-2.5-flash", label: "Gemini 2.5 Flash" },
                { value: "gemini-1.5-pro", label: "Gemini 1.5 Pro" }
            ],
            "DeepSeek": [
                { value: "deepseek-chat", label: "DeepSeek Chat" },
                { value: "deepseek-reasoner", label: "DeepSeek Reasoner" }
            ],
            "Local": [
                { value: "llama3", label: "Ollama (Llama 3)" }
            ]
        };

        function togglePassword(inputId, btnElement) {
            const input = document.getElementById(inputId);
            if (input.type === "password") {
                input.type = "text";
                btnElement.innerHTML = "🙈";
                btnElement.style.opacity = "1";
            } else {
                input.type = "password";
                btnElement.innerHTML = "👁️";
                btnElement.style.opacity = "0.6";
            }
        }

        function atualizarModelos() {
            const providerSelect = document.getElementById("providerSelect");
            const modelSelect = document.getElementById("modelSelect");
            const provedorSelecionado = providerSelect.value;
            modelSelect.innerHTML = "";
            if (provedorSelecionado && modelosPorProvedor[provedorSelecionado]) {
                modelosPorProvedor[provedorSelecionado].forEach(modelo => {
                    const option = document.createElement("option");
                    option.value = modelo.value;
                    option.textContent = modelo.label;
                    modelSelect.appendChild(option);
                });
            } else {
                const option = document.createElement("option");
                option.value = "";
                option.textContent = "Selecione um provedor primeiro";
                modelSelect.appendChild(option);
            }
        }

        function atualizarModelosEdicao() {
            const providerSelect = document.getElementById("edit-provider");
            const modelSelect = document.getElementById("edit-model");
            const provedorSelecionado = providerSelect.value;
            modelSelect.innerHTML = "";
            if (provedorSelecionado && modelosPorProvedor[provedorSelecionado]) {
                modelosPorProvedor[provedorSelecionado].forEach(modelo => {
                    const option = document.createElement("option");
                    option.value = modelo.value;
                    option.textContent = modelo.label;
                    modelSelect.appendChild(option);
                });
            } else {
                const option = document.createElement("option");
                option.value = "";
                option.textContent = "Selecione um provedor primeiro";
                modelSelect.appendChild(option);
            }
        }

        function descobrirProvedorPorModelo(modeloValor) {
            for (const [provedor, modelos] of Object.entries(modelosPorProvedor)) {
                if (modelos.some(m => m.value === modeloValor)) return provedor;
            }
            return "Selecione";
        }

        function editarLLM(id, nome, api_key) {
            document.getElementById("edit-id").value = id;
            document.getElementById("edit-apikey").value = api_key;
            const provedor = descobrirProvedorPorModelo(nome);
            document.getElementById("edit-provider").value = provedor;
            atualizarModelosEdicao();
            document.getElementById("edit-model").value = nome;
            document.getElementById("modal-editar").style.display = "flex";
        }

        function salvarEdicao() {
            const id = document.getElementById("edit-id").value;
            const nome = document.getElementById("edit-model").value;
            const api_key = document.getElementById("edit-apikey").value;
            fetch(`/api/llm/${id}/edit/`, {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json",
                    "X-CSRFToken": getCSRFToken()
                },
                body: JSON.stringify({ nome, api_key })
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === "success") {
                    const elemento = document.getElementById(`llm-nome-${id}`);
                    if (elemento) elemento.innerText = nome;
                    document.getElementById("modal-editar").style.display = "none";
                } else {
                    alert("Erro ao salvar: " + data.message);
                }
            })
            .catch(error => {
                console.error("Erro na requisição:", error);
                alert("Erro ao comunicar com o servidor.");
            });
        }

        function sairEdicao() { document.getElementById("modal-editar").style.display = "none"; }

        function deletarLLM(id) {
            fetch(`/api/llm/${id}/delete/`, {
                method: "DELETE",
                headers: { "X-CSRFToken": getCSRFToken() }
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === "success") {
                    const card = document.getElementById(`llm-${id}`);
                    if (card) card.remove();
                }
            });
        }

        function getCSRFToken() { return document.querySelector('[name=csrfmiddlewaretoken]').value; }
        function abrirModal() { document.getElementById("modal").style.display = "flex"; }
        function fecharModal() { document.getElementById("modal").style.display = "none"; }

        window.onclick = function(event) {
            const modal = document.getElementById("modal");
            if (event.target == modal) modal.style.display = "none";
        }
    </script>

</body>
</html>
