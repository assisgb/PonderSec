{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PonderSEC — Configurar Métricas</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: "Space Grotesk", system-ui, sans-serif;
    background: radial-gradient(circle at top, #051015 0, #02060b 45%, #000000 100%);
    color: #e5fef6;
    min-height: 100vh;
    padding: 20px;
}

/* Background effects */
.background-grid {
    position: fixed;
    inset: 0;
    background-image:
        linear-gradient(90deg, rgba(0,255,160,0.06) 1px, transparent 1px),
        linear-gradient(180deg, rgba(0,255,160,0.06) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.4;
}

.scanline {
    position: fixed;
    inset: 0;
    background: linear-gradient(to bottom, rgba(0,0,0,0.7), rgba(0,0,0,0.15), rgba(0,0,0,0.7));
    background-size: 100% 4px;
    opacity: 0.25;
}

.container {
    position: relative;
    max-width: 1200px;
    margin: 0 auto;
}

/* Header */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 35px;
    padding: 30px 35px;
    background: rgba(11,20,29,0.6);
    border-radius: 16px;
    border: 1px solid rgba(0,255,160,0.15);
}

.logo-section {
    display: flex;
    align-items: center;
    gap: 22px;
}

.logo-section img {
    width: 85px;
    height: 85px;
    border-radius: 12px;
}

.product-name {
    color: #7df6c2;
    text-transform: uppercase;
    letter-spacing: 0.25em;
    font-size: 12px;
    font-weight: 600;
}

.page-title {
    color: #00ff9f;
    font-size: 28px;
    font-weight: 600;
}

.btn-back {
    padding: 12px 28px;
    background: rgba(0,255,160,0.1);
    border: 1px solid rgba(0,255,160,0.3);
    border-radius: 8px;
    color: #00ff9f;
    text-decoration: none;
    font-weight: 600;
    transition: all 0.3s;
}

.btn-back:hover {
            background: rgba(0, 255, 160, 0.15);
            border-color: #00ff9f;
            transform: translateY(-1px);

        }

/* Section */
.metrics-section {
    padding: 30px;
    background: rgba(11,20,29,0.5);
    border-radius: 12px;
    border: 1px solid rgba(0,255,160,0.2);
}

.metrics-title {
    color: #00ff9f;
    font-size: 20px;
    margin-bottom: 10px;
}

.metrics-description {
    font-size: 13px;
    color: #9cdcd0;
    margin-bottom: 25px;
}

.metric-item {
    background: rgba(11,20,29,0.4);
    border: 1px solid rgba(0,255,160,0.15);
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 20px;
}

.metric-item input,
.metric-item textarea,
.metric-item select {
    width: 100%;
    padding: 10px;
    margin-top: 6px;
    margin-bottom: 12px;
    background: #050a11;
    border: 1px solid #1b2635;
    border-radius: 6px;
    color: #e5fef6;
}

.metric-item textarea {
    resize: vertical;
}

.radio-group {
    display: flex;
    gap: 20px;
    margin-bottom: 10px;
}

.radio-group label {
    cursor: pointer;
}

.btn-add, .btn-save, .btn-delete {
    padding: 10px 20px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 600;
    border: none;
}

.btn-add{
    background: rgba(0,255,160,0.15);
    border: 1px solid rgba(0,255,160,0.4);
    color: #00ff9f;
    transition: all 0.3s;
}
.btn-add:hover {
            background: rgba(0, 255, 160, 0.15);
            border-color: #00ff9f;
            transform: translateY(-1px);

        }


.btn-delete {
    background: rgba(255,0,0,0.1);
    border: 1px solid rgba(255,0,0,0.3);
    color: #ff6b6b;
}

.submit-section {
    text-align: center;
    margin-top: 30px;
}
</style>
</head>

<body>

<div class="background-grid"></div>
<div class="scanline"></div>

<div class="container">

<div class="header">
    <div class="logo-section">
        <img src="{% static 'pondersec_logo.jpg' %}">
        <div>
            <div class="product-name">PONDERSEC</div>
            <div class="page-title">Configurar Métricas</div>
        </div>
    </div>
    <a href="{% url 'setup_avaliacao' %}" class="btn-back">Voltar</a>
</div>

<div class="metrics-section">
    <div class="metrics-title">Métricas de Avaliação</div>
    <div class="metrics-description">
        Defina se a métrica será <strong>Quantitativa</strong> (com pontuação máxima)
        ou <strong>Qualitativa</strong> (avaliação textual).
    </div>

    <div id="metricsContainer">

        <div class="metric-item">
                <label>Nome da Métrica</label>
                <input type="text">

                <label>Descrição</label>
                <input type="text">

                <label>Tipo de Métrica</label>
                <div class="radio-group">
                    <label>
                        <input type="radio"  name="name" value="quantitativa">
                        Quantitativa
                    </label>
                    <label>
                        <input type="radio" name="name" value="qualitativa">
                        Qualitativa
                    </label>
                </div>

                 <label>Pontuação Máxima</label>
                    <input type="number" min="1" >
                    <label>Critério de Avaliação (Texto)</label>
                    <textarea rows="3">
                    </textarea>
               
            </div>




    </div>

    

    <div class="submit-section">
        <button class="btn-add">Salvar Métrica</button>
    </div>
</div>

</div>

<script>

</script>

</body>
</html>
