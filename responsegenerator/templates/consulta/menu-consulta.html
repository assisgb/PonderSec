{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PonderSEC — Consulta</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: "Space Grotesk", system-ui, sans-serif;
            background: radial-gradient(circle at top, #051015 0, #02060b 45%, #000000 100%);
            color: #e5fef6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .background-grid {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(90deg, rgba(0, 255, 160, 0.06) 1px, transparent 1px),
                linear-gradient(180deg, rgba(0, 255, 160, 0.06) 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.4;
            pointer-events: none;
        }

        .scanline {
            position: fixed;
            inset: 0;
            background-image: repeating-linear-gradient(
                to bottom,
                transparent 0px,
                transparent 3px,
                rgba(0, 0, 0, 0.12) 3px,
                rgba(0, 0, 0, 0.12) 4px
            );
            opacity: 0.6;
            pointer-events: none;
        }

        .glow-orb {
            position: fixed;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 255, 160, 0.3), transparent 65%);
            top: 10%;
            right: 10%;
            filter: blur(80px);
            opacity: 0.75;
            pointer-events: none;
        }

        .container {
            position: relative;
            width: 100%;
            max-width: 780px;
            background: radial-gradient(circle at top, #0b141d 0, #050a11 55%, #020509 100%);
            border-radius: 18px;
            padding: 40px 44px 44px;
            box-shadow:
                0 0 0 1px rgba(0, 255, 160, 0.25),
                0 18px 60px rgba(0, 0, 0, 0.9),
                0 0 40px rgba(0, 255, 160, 0.35);
            z-index: 2;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 28px;
            padding-bottom: 24px;
            border-bottom: 1px solid rgba(0, 255, 160, 0.15);
        }

        .logo img {
            width: 72px;
            border-radius: 10px;
            filter:
                drop-shadow(0 0 10px rgba(0, 255, 160, 0.8))
                drop-shadow(0 0 30px rgba(0, 255, 160, 0.5));
        }

        .header-text { flex: 1; }

        .product-name {
            color: #7df6c2;
            text-transform: uppercase;
            letter-spacing: 0.28em;
            font-size: 12px;
            margin-bottom: 4px;
        }

        .headline {
            color: #00ff9f;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .subtitle {
            font-size: 13px;
            color: #8ba1b0;
        }

        .section-label {
            font-size: 10px;
            color: #4ecf9a;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.25em;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .section-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(to right, rgba(0, 255, 160, 0.2), transparent);
        }

        .cards-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 32px;
        }

        .card {
            background: radial-gradient(circle at top left, #0b141d 0, #050a11 100%);
            border: 1px solid rgba(0, 255, 160, 0.25);
            border-radius: 14px;
            padding: 36px 28px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 16px;
            position: relative;
            overflow: hidden;
            color: inherit;
        }

        .card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 0% 0%, rgba(0, 255, 160, 0.05) 0%, transparent 60%);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .card:hover::before { opacity: 1; }

        .card:hover {
            border-color: #00ff9f;
            box-shadow: 0 0 30px rgba(0, 255, 160, 0.4);
            transform: translateY(-5px);
            background: radial-gradient(circle at top left, #0d1823 0, #060b12 100%);
        }

        .card-icon {
            width: 60px;
            height: 60px;
            background: rgba(0, 255, 160, 0.06);
            border: 1px solid rgba(0, 255, 160, 0.2);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .card:hover .card-icon {
            background: rgba(0, 255, 160, 0.12);
            border-color: rgba(0, 255, 160, 0.4);
        }

        .card-icon svg {
            filter: drop-shadow(0 0 6px rgba(0, 255, 160, 0.5));
            transition: filter 0.3s;
        }

        .card:hover .card-icon svg {
            filter: drop-shadow(0 0 12px rgba(0, 255, 160, 0.8));
        }

        .card-title {
            color: #00ff9f;
            font-size: 18px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .card-desc {
            font-size: 12px;
            color: #8ba1b0;
            line-height: 1.5;
            flex: 1;
        }

        .card-footer {
            display: flex;
            align-items: center;
            gap: 6px;
            color: rgba(0, 255, 160, 0.4);
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: all 0.3s;
        }

        .card:hover .card-footer { color: #00ff9f; gap: 10px; }
        .card-footer svg { transition: transform 0.3s; }
        .card:hover .card-footer svg { transform: translateX(3px); }

        .logout-section {
            text-align: center;
            padding-top: 18px;
            border-top: 1px solid rgba(0, 255, 160, 0.15);
        }

        .btn-back {
            padding: 10px 28px;
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid rgba(255, 0, 0, 0.3);
            border-radius: 999px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            color: #ff6b6b;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-back:hover {
            background: rgba(255, 0, 0, 0.2);
            border-color: #ff6b6b;
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.3);
        }

        @media (max-width: 600px) {
            .cards-grid { grid-template-columns: 1fr; }
            .header { flex-direction: column; text-align: center; }
            .container { padding: 30px 24px; }
        }
    </style>
</head>
<body>
    <div class="background-grid"></div>
    <div class="scanline"></div>
    <div class="glow-orb"></div>

    <div class="container">
        <div class="header">
            <div class="logo">
                <img src="{% static 'pondersec_logo.jpg' %}" alt="PonderSEC Logo">
            </div>
            <div class="header-text">
                <div class="product-name">PonderSEC</div>
                <div class="headline">Consulta</div>
                <div class="subtitle">Escolha uma opção para consultar informações do sistema</div>
            </div>
        </div>

        <div class="section-label">Opções</div>

        <div class="cards-grid">
            <a href="{% url 'executar_consulta' %}" class="card">
                <div class="card-icon">
                    <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#00ff9f" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"/>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                    </svg>
                </div>
                <div class="card-title">Executar Consulta</div>
                <div class="card-desc">Visualizar e executar perguntas cadastradas no sistema.</div>
                <div class="card-footer">
                    Acessar
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                        <path d="M5 12h14M13 6l6 6-6 6"/>
                    </svg>
                </div>
            </a>

            <a href="{% url 'consulta_comparacao' %}" class="card">
                <div class="card-icon">
                    <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#00ff9f" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 20h18"/>
                        <path d="M5 20V14"/>
                        <path d="M8 20V10"/>
                        <path d="M11 20V6"/>
                        <path d="M14 20V9"/>
                        <path d="M17 20V13"/>
                        <path d="M20 20V16"/>
                        <path d="M5 14l3-4 3-4 3 3 3-6 3 4"/>
                    </svg>
                </div>
                <div class="card-title">Respostas da LLM</div>
                <div class="card-desc">Comparar respostas geradas por diferentes modelos.</div>
                <div class="card-footer">
                    Acessar
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                        <path d="M5 12h14M13 6l6 6-6 6"/>
                    </svg>
                </div>
            </a>
        </div>

        <div class="logout-section">
            <a href="{% url 'menu' %}" class="btn-back">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                    <path d="M19 12H5M11 6l-6 6 6 6"/>
                </svg>
                Voltar ao Menu
            </a>
        </div>
    </div>
</body>
</html>
