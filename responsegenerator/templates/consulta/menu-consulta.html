{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PonderSEC — Consulta</title>

    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Space Grotesk", system-ui, sans-serif;
            background: radial-gradient(circle at top, #051015 0, #02060b 45%, #000000 100%);
            color: #e5fef6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .background-grid {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(90deg, rgba(0, 255, 160, 0.06) 1px, transparent 1px),
                linear-gradient(180deg, rgba(0, 255, 160, 0.06) 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.4;
            pointer-events: none;
        }

        .scanline {
            position: fixed;
            inset: 0;
            background: linear-gradient(
                to bottom,
                rgba(0, 0, 0, 0.7),
                rgba(0, 0, 0, 0.15),
                rgba(0, 0, 0, 0.7)
            );
            background-size: 100% 4px;
            opacity: 0.25;
            pointer-events: none;
        }

        .glow-orb {
            position: fixed;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 255, 160, 0.25), transparent 70%);
            top: -10%;
            right: -5%;
            filter: blur(80px);
            opacity: 0.6;
            pointer-events: none;
        }

        .container {
            position: relative;
            width: 100%;
            max-width: 800px;
            background: radial-gradient(circle at top, #0b141d 0, #050a11 55%, #020509 100%);
            border-radius: 18px;
            padding: 40px;
            box-shadow:
                0 0 0 1px rgba(0, 255, 160, 0.25),
                0 18px 60px rgba(0, 0, 0, 0.9),
                0 0 40px rgba(0, 255, 160, 0.35);
            z-index: 2;
        }

        .logo {
            text-align: center;
            margin-bottom: 15px;
        }

        .logo img {
            width: 120px;
            border-radius: 10px;
            filter: drop-shadow(0 0 10px rgba(0, 255, 160, 0.8));
        }

        .product-name {
            text-align: center;
            color: #7df6c2;
            text-transform: uppercase;
            letter-spacing: 0.28em;
            font-size: 12px;
            margin-bottom: 6px;
        }

        .headline {
            text-align: center;
            color: #00ff9f;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            font-size: 14px;
            color: #8ba1b0;
            margin-bottom: 40px;
        }

        .buttons-container {
            display: grid;
            grid-template-columns: 1fr;
            justify-items: center;
        }

        .cta-button {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
            padding: 45px 30px;
            background: radial-gradient(circle at top left, #0b141d 0, #050a11 100%);
            border: 1px solid rgba(0, 255, 160, 0.25);
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            color: inherit;
            max-width: 350px;
             width: 100%;
        }

        .cta-button:hover {
            border-color: #00ff9f;
            box-shadow: 0 0 30px rgba(0, 255, 160, 0.4);
            transform: translateY(-5px);
            background: radial-gradient(circle at top left, #0d1823 0, #060b12 100%);
        }

        .cta-icon {
            font-size: 60px;
            filter: drop-shadow(0 0 10px rgba(0, 255, 160, 0.5));
        }

        .cta-title {
            font-size: 20px;
            font-weight: 700;
            color: #00ff9f;
            text-align: center;
        }

        .cta-description {
            font-size: 13px;
            color: #8ba1b0;
            text-align: center;
        }

        .btn-back {
            width: 100%;
            padding: 12px;
            margin-top: 30px;
            background: rgba(0, 255, 160, 0.1);
            border: 1px solid rgba(0, 255, 160, 0.3);
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            color: #00ff9f;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: all 0.2s;
            display: block;
            text-align: center;
        }

        .btn-back:hover {
            background: rgba(0, 255, 160, 0.15);
            border-color: #00ff9f;
        }

        @media (max-width: 768px) {
            .buttons-container {
                grid-template-columns: 1fr;
            }

            .container {
                padding: 30px 25px;
            }

            .headline {
                font-size: 24px;
            }

            .cta-button {
                padding: 35px 25px;
            }
        }
    </style>
</head>

<body>
    <div class="background-grid"></div>
    <div class="scanline"></div>
    <div class="glow-orb"></div>

    <div class="container">
        <div class="logo">
            <img src="{% static 'pondersec_logo.jpg' %}" alt="PonderSEC Logo">
        </div>

        <div class="product-name">PONDERSEC</div>
        <div class="headline">Consulta</div>
        <div class="subtitle">
            Escolha uma opção para consultar informações do sistema
        </div>

        <div class="buttons-container">
            <a href="{% url 'executar_consulta' %}" class="cta-button">
                <div class="cta-icon">🔍</div>
                <div class="cta-title">Executar Consulta</div>
                <div class="cta-description">
                    Visualizar e executar perguntas cadastradas no sistema
                </div>
            </a>
        </div>

        <a class="btn-back" href="{% url 'menu' %}">
            Voltar ao Menu
        </a>
    </div>
</body>
</html>
