{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PonderSEC — LLM</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Space Grotesk", system-ui, sans-serif;
            background: radial-gradient(circle at top, #051015 0, #02060b 45%, #000000 100%);
            color: #e5fef6;
            min-height: 100vh;
            padding: 20px;
        }

        .background-grid {
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(90deg, rgba(0, 255, 160, 0.06) 1px, transparent 1px),
                linear-gradient(180deg, rgba(0, 255, 160, 0.06) 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.4;
            pointer-events: none;
        }

        .scanline {
            position: fixed;
            inset: 0;
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.15), rgba(0, 0, 0, 0.7));
            background-size: 100% 4px;
            opacity: 0.25;
            pointer-events: none;
        }

        .glow-orb {
            position: fixed;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 255, 160, 0.25), transparent 70%);
            top: -10%;
            right: -5%;
            filter: blur(80px);
            opacity: 0.6;
            pointer-events: none;
        }

        .container {
            position: relative;
            max-width: 1000px;
            margin: 0 auto;
            z-index: 2;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
            padding: 25px 30px;
            background: radial-gradient(circle at top left, #0b141d 0, #050a11 100%);
            border-radius: 16px;
            border: 1px solid rgba(0, 255, 160, 0.25);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.6);
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .logo-section img {
            width: 70px;
            height: 70px;
            border-radius: 10px;
            filter: drop-shadow(0 0 15px rgba(0, 255, 160, 0.8));
        }

        .header-title {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .product-name {
            color: #7df6c2;
            text-transform: uppercase;
            letter-spacing: 0.25em;
            font-size: 11px;
            font-weight: 600;
        }

        .page-title {
            color: #00ff9f;
            font-size: 26px;
            font-weight: 700;
        }

        .btn-back {
            padding: 12px 28px;
            background: linear-gradient(90deg, #00ff9f, #00ff57);
            border: none;
            border-radius: 999px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 700;
            color: #020509;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            transition: all 0.2s;
        }

        .btn-back:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 25px rgba(0, 255, 160, 1);
        }

        .toolbar {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }

        .search-bar {
            position: relative;
            flex: 1;
        }

        .search-input {
            width: 100%;
            padding: 14px 18px 14px 45px;
            background: #050a11;
            border: 1px solid #1b2635;
            border-radius: 10px;
            color: #e5fef6;
            font-size: 15px;
            font-family: "Space Grotesk", system-ui, sans-serif;
            outline: none;
            transition: all 0.2s;
        }

        .search-input::placeholder {
            color: #6b7b8d;
        }

        .search-input:focus {
            border-color: #00ff9f;
            box-shadow: 0 0 16px rgba(0, 255, 160, 0.5);
        }

        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #7df6c2;
            font-size: 18px;
        }

        .btn-add {
            padding: 14px 28px;
            background: linear-gradient(90deg, #00ff9f, #00ff57);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 700;
            color: #020509;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 25px rgba(0, 255, 160, 1);
        }

        .llm-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .llm-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 25px;
            background: radial-gradient(circle at top left, #0b141d 0, #050a11 100%);
            border: 1px solid rgba(0, 255, 160, 0.25);
            border-radius: 12px;
            transition: all 0.3s;
        }

        .llm-card:hover {
            border-color: #00ff9f;
            box-shadow: 0 0 20px rgba(0, 255, 160, 0.3);
        }

        .llm-info {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .llm-icon {
            font-size: 36px;
            filter: drop-shadow(0 0 8px rgba(0, 255, 160, 0.5));
        }

        .llm-details {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .llm-name {
            font-size: 18px;
            font-weight: 700;
            color: #00ff9f;
        }

        .llm-description {
            font-size: 13px;
            color: #8ba1b0;
        }

        .llm-actions {
            display: flex;
            gap: 10px;
        }

        .btn-icon {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            border: 1px solid;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.2s;
        }

        .btn-edit {
            background: rgba(0, 255, 160, 0.1);
            border-color: rgba(0, 255, 160, 0.3);
            color: #7df6c2;
        }

        .btn-edit:hover {
            background: rgba(0, 255, 160, 0.2);
            border-color: #00ff9f;
            color: #00ff9f;
            transform: scale(1.05);
        }

        .btn-delete {
            background: rgba(255, 0, 0, 0.1);
            border-color: rgba(255, 0, 0, 0.3);
            color: #ff6b6b;
        }

        .btn-delete:hover {
            background: rgba(255, 0, 0, 0.2);
            border-color: #ff6b6b;
            transform: scale(1.05);
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 20px;
                text-align: center;
            }

            .logo-section {
                flex-direction: column;
            }

            .btn-back {
                width: 100%;
            }

            .toolbar {
                flex-direction: column;
            }

            .llm-card {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }

            .llm-info {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="background-grid"></div>
    <div class="scanline"></div>
    <div class="glow-orb"></div>

    <div class="container">
        <div class="header">
            <div class="logo-section">
                <img src="{% static 'pondersec_logo.jpg' %}" alt="PonderSEC Logo">
                <div class="header-title">
                    <div class="product-name">PONDERSEC</div>
                    <div class="page-title">Gerenciar LLMs</div>
                </div>
            </div>
            <a href="{% url 'setup' %}" class="btn-back">Voltar</a>
        </div>

        <div class="toolbar">
            <div class="search-bar">
                <span class="search-icon">🔎</span>
                <input 
                    type="text" 
                    class="search-input" 
                    id="searchInput"
                    placeholder="Buscar LLM..."
                    onkeyup="filterLLMs()"
                >
            </div>
            <button class="btn-add" onclick="addLLM()">+ Adicionar</button>
        </div>

        <div class="llm-list" id="llmList">
            <div class="llm-card" data-name="chatgpt">
                <div class="llm-info">
                    <div class="llm-icon">🤖</div>
                    <div class="llm-details">
                        <div class="llm-name">ChatGPT</div>
                        <div class="llm-description">OpenAI GPT-4 - Modelo de linguagem avançado</div>
                    </div>
                </div>
                <div class="llm-actions">
                    <button class="btn-icon btn-edit" onclick="editLLM('ChatGPT')" title="Editar">✏️</button>
                    <button class="btn-icon btn-delete" onclick="deleteLLM('ChatGPT')" title="Deletar">🗑️</button>
                </div>
            </div>

            <div class="llm-card" data-name="groq">
                <div class="llm-info">
                    <div class="llm-icon">⚡</div>
                    <div class="llm-details">
                        <div class="llm-name">Groq</div>
                        <div class="llm-description">LLM de alta performance e velocidade</div>
                    </div>
                </div>
                <div class="llm-actions">
                    <button class="btn-icon btn-edit" onclick="editLLM('Groq')" title="Editar">✏️</button>
                    <button class="btn-icon btn-delete" onclick="deleteLLM('Groq')" title="Deletar">🗑️</button>
                </div>
            </div>

            <div class="llm-card" data-name="gemini">
                <div class="llm-info">
                    <div class="llm-icon">💎</div>
                    <div class="llm-details">
                        <div class="llm-name">Gemini</div>
                        <div class="llm-description">Google Gemini - Multimodal AI model</div>
                    </div>
                </div>
                <div class="llm-actions">
                    <button class="btn-icon btn-edit" onclick="editLLM('Gemini')" title="Editar">✏️</button>
                    <button class="btn-icon btn-delete" onclick="deleteLLM('Gemini')" title="Deletar">🗑️</button>
                </div>
            </div>

            <div class="llm-card" data-name="claude">
                <div class="llm-info">
                    <div class="llm-icon">🧠</div>
                    <div class="llm-details">
                        <div class="llm-name">Claude</div>
                        <div class="llm-description">Anthropic Claude - Assistente de IA confiável</div>
                    </div>
                </div>
                <div class="llm-actions">
                    <button class="btn-icon btn-edit" onclick="editLLM('Claude')" title="Editar">✏️</button>
                    <button class="btn-icon btn-delete" onclick="deleteLLM('Claude')" title="Deletar">🗑️</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function filterLLMs() {
            const input = document.getElementById('searchInput');
            const filter = input.value.toLowerCase();
            const cards = document.querySelectorAll('.llm-card');

            cards.forEach(card => {
                const name = card.getAttribute('data-name');
                if (name.includes(filter)) {
                    card.style.display = '';
                } else {
                    card.style.display = 'none';
                }
            });
        }

        function addLLM() {
            alert('Funcionalidade de adicionar LLM');
            // Aqui você pode abrir um modal ou redirecionar para página de criação
        }

        function editLLM(name) {
            alert('Editar: ' + name);
            // Aqui você pode abrir um modal de edição ou redirecionar
        }

        function deleteLLM(name) {
            if (confirm('Deseja realmente deletar ' + name + '?')) {
                alert('LLM ' + name + ' deletado!');
                // Aqui você faria a chamada para deletar no backend
            }
        }
    </script>
</body>
</html>
