upstream pondersec_web {
    server web:8000;
    keepalive 32;
}

gzip on;
gzip_comp_level 5;
gzip_min_length 1024;
gzip_vary on;
gzip_types text/plain text/css application/json application/javascript image/svg+xml;

server {
    listen 80;
    #server_name 10.208.200.20;
    server_name pondersec.icomp.ufam.edu.br;

    # Força tudo que for HTTP a virar HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name pondersec.icomp.ufam.edu.br;
    #server_name 10.208.200.20;
    # Caminho dos certificados autoassinados dentro do container

    ssl_certificate /etc/nginx/ssl/selfsigned.crt;
    ssl_certificate_key /etc/nginx/ssl/selfsigned.key;
    #ssl_certificate /etc/letsencrypt/live/pondersec.icomp.ufam.edu.br/fullchain.pem;
    #ssl_certificate_key /etc/letsencrypt/live/pondersec.icomp.ufam.edu.br/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    location / {
        proxy_pass http://pondersec_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;

        # Devem permanecer acima dos limites da aplicação/Gunicorn.
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        send_timeout 300s;
    }

    location /static/ {
        alias /static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}
