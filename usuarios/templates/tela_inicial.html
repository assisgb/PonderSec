{% extends "base.html" %}
{% load static i18n %}

{% block title %}{% translate "PonderSEC — Início" %}{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/auth.css' %}">
<style>
    .container {
        max-width: 480px;
        padding: 40px 40px 50px;
        text-align: center;
    }

    .title {
        color: #00ff9f;
        font-size: 26px;
        font-weight: 700;
        letter-spacing: 0.12em;
        margin-bottom: 20px;
    }

    .options {
        display: flex;
        flex-direction: column;
        gap: 14px;
        margin-top: 12px;
    }

    .option-btn {
        padding: 14px;
        width: 100%;
        border: none;
        border-radius: 999px;
        cursor: pointer;
        font-size: 15px;
        font-weight: 700;
        color: #020509;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        background: linear-gradient(90deg, #00ff9f, #00ff57);
        transition: all 0.2s;
    }

    .option-btn:hover {
        transform: translateY(-2px);
        box-shadow:
            0 0 25px rgba(0, 255, 160, 0.9),
            0 8px 30px rgba(0, 0, 0, 0.9);
    }
</style>
{% endblock %}

{% block body %}
<div class="container">

    <div class="logo">
        <img src="{% static 'pondersec_logo.jpg' %}" alt="Logo">
    </div>

    <div class="title">{% translate "Escolha uma Ação" %}</div>

    <div class="options">
        <button class="option-btn">{% translate "Realizar Avaliação" %}</button>
        <button class="option-btn">{% translate "Ver Resultados" %}</button>
        <button class="option-btn">{% translate "Sair" %}</button>
    </div>

    <footer class="footer">
        {% translate "PonderSEC © 2025 — Segurança Ofensiva" %}
    </footer>
</div>
{% endblock %}
