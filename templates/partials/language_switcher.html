{% load i18n %}
{% get_current_language as CURRENT_LANGUAGE %}
{% get_available_languages as AVAILABLE_LANGUAGES %}

<script>
  (function () {
    var t = localStorage.getItem('pondersec-theme');
    if (t === 'light') document.documentElement.setAttribute('data-theme', 'light');
  })();
</script>

<style>
    /* ── Language switcher ── */
    .language-switcher {
        position: fixed;
        top: 16px;
        right: 16px;
        z-index: 9999;
    }

    .language-switcher form {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 4px;
        background: rgba(2, 6, 11, 0.82);
        border: 1px solid rgba(0, 255, 160, 0.24);
        border-radius: 999px;
        box-shadow: 0 10px 28px rgba(0, 0, 0, 0.38);
        backdrop-filter: blur(10px);
    }

    .language-switcher button {
        min-width: 38px;
        height: 30px;
        border: 0;
        border-radius: 999px;
        background: transparent;
        color: #8ba1b0;
        cursor: pointer;
        font: 700 11px/1 "Space Grotesk", system-ui, sans-serif;
        letter-spacing: 0.08em;
        transition: background 0.2s, color 0.2s, box-shadow 0.2s;
    }

    .language-switcher button:hover,
    .language-switcher button.is-active {
        background: rgba(0, 255, 160, 0.12);
        color: #00ff9f;
        box-shadow: inset 0 0 0 1px rgba(0, 255, 160, 0.2);
    }

    .lang-divider {
        width: 1px;
        height: 16px;
        background: rgba(0, 255, 160, 0.15);
        margin: 0 2px;
        flex-shrink: 0;
    }

    .theme-toggle-btn {
        min-width: 34px;
        height: 30px;
        border: 0;
        border-radius: 999px;
        background: transparent;
        color: #8ba1b0;
        cursor: pointer;
        font-size: 14px;
        line-height: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.2s, color 0.2s, box-shadow 0.2s;
    }

    .theme-toggle-btn:hover {
        background: rgba(0, 255, 160, 0.12);
        color: #00ff9f;
        box-shadow: inset 0 0 0 1px rgba(0, 255, 160, 0.2);
    }

    @media (max-width: 600px) {
        .language-switcher { top: 10px; right: 10px; }
        .language-switcher button { min-width: 34px; height: 28px; font-size: 10px; }
        .theme-toggle-btn { height: 28px; }
    }

       TEMA CLARO — [data-theme="light"]

    /* Variáveis CSS (questoes.html usa --bg, --text, --accent etc.) */
    [data-theme="light"] {
        --bg: #f0f5fb;
        --surface: rgba(255, 255, 255, 0.92);
        --surface-strong: rgba(255, 255, 255, 0.99);
        --surface-soft: rgba(5, 150, 105, 0.04);
        --border: rgba(5, 150, 105, 0.16);
        --border-strong: rgba(5, 150, 105, 0.32);
        --accent: #047857;
        --accent-bright: #059669;
        --accent-blue: #0284c7;
        --accent-violet: #6d28d9;
        --danger: #dc2626;
        --warn: #b45309;
        --text: #111827;
        --text-strong: #030712;
        --muted: #6b7280;
        --muted-deep: #374151;
    }

    /* Fundo e cor base */

    /* Grid de fundo e efeitos decorativos */

        opacity: 0.3 !important;
    }
    [data-theme="light"] body::before {
        background-image:

    }
    [data-theme="light"] .spinner {

    /* ══════════════════════════════════════════
       AVALIAÇÃO PÚBLICA — variáveis e classes
       exclusivas de avaliacao_publica.html
       ══════════════════════════════════════════ */

    /* Variáveis CSS da página pública */
    [data-theme="light"] {
        --green:        #059669;
        --green-dim:    rgba(5,150,105,0.1);
        --green-glow:   rgba(5,150,105,0.3);
        --purple:       #7c3aed;
        --purple-dim:   rgba(124,58,237,0.1);
        --bg-card:      rgba(255,255,255,0.95);
        --text-muted:   #6b7280;
        --text-label:   #374151;
        --input-bg:     #f9fafb;
        --input-border: #d1d5db;
    }

    /* Fundo e decoração */
    [data-theme="light"] .bg-grid {
        background-image:
            linear-gradient(90deg, rgba(0,0,0,0.04) 1px, transparent 1px),
            linear-gradient(180deg, rgba(0,0,0,0.04) 1px, transparent 1px) !important;
        opacity: 0.3 !important;
    }
    [data-theme="light"] .bg-orb { display: none !important; }

    /* Card de identificação */
    [data-theme="light"] .ident-card {
        background: #ffffff !important;
        border: 1px solid rgba(5,150,105,0.2) !important;
        box-shadow: 0 0 0 1px rgba(5,150,105,0.06), 0 18px 60px rgba(0,0,0,0.08) !important;
    }
    [data-theme="light"] .ident-header h1 { color: #059669 !important; }
    [data-theme="light"] .ident-header p  { color: #6b7280 !important; }
    [data-theme="light"] .ident-header img {
        filter: drop-shadow(0 0 10px rgba(5,150,105,0.3)) !important;
    }

    /* Topbar de avaliação */
    [data-theme="light"] .eval-topbar  { border-color: #e5e7eb !important; }
    [data-theme="light"] .eval-title   { color: #059669 !important; }
    [data-theme="light"] .eval-counter { color: #6b7280 !important; }
    [data-theme="light"] .eval-counter span { color: #059669 !important; }
    [data-theme="light"] .eval-logo {
        filter: drop-shadow(0 0 6px rgba(5,150,105,0.25)) !important;
    }

    /* Barra de progresso */
    [data-theme="light"] .progress-track { background: #e5e7eb !important; }
    [data-theme="light"] .progress-fill {
        background: linear-gradient(90deg, #059669, #047857) !important;
    }
    [data-theme="light"] .progress-fill::after {
        background: #059669 !important;
        box-shadow: 0 0 8px rgba(5,150,105,0.4) !important;
    }

    /* Dots de navegação */
    [data-theme="light"] .dot      { background: #d1d5db !important; }
    [data-theme="light"] .dot.active {
        background: #059669 !important;
        box-shadow: 0 0 7px rgba(5,150,105,0.4) !important;
    }
    [data-theme="light"] .dot.done { background: rgba(5,150,105,0.35) !important; }

    /* Mapa de questões */
    [data-theme="light"] .question-chip {
        background: rgba(255,255,255,0.85) !important;
        border-color: #e5e7eb !important;
        color: #6b7280 !important;
    }
    [data-theme="light"] .question-chip:hover {
        border-color: rgba(5,150,105,0.4) !important;
        color: #374151 !important;
    }
    [data-theme="light"] .question-chip.active {
        border-color: rgba(5,150,105,0.6) !important;
        background: rgba(5,150,105,0.08) !important;
        color: #059669 !important;
        box-shadow: 0 0 10px rgba(5,150,105,0.08) !important;
    }
    [data-theme="light"] .question-chip.done {
        border-color: rgba(5,150,105,0.28) !important;
        color: rgba(5,150,105,0.8) !important;
    }
    [data-theme="light"] .question-map::-webkit-scrollbar-thumb { background: #d1d5db !important; }

    /* Carrossel */
    [data-theme="light"] .carousel-shell {
        background: #ffffff !important;
        border-color: rgba(5,150,105,0.15) !important;
        box-shadow: 0 8px 30px rgba(0,0,0,0.08) !important;
    }
    [data-theme="light"] .carousel-shell::before {
        background: linear-gradient(90deg, transparent, #059669, transparent) !important;
        opacity: 0.3 !important;
    }

    /* Slide — texto e resposta */
    [data-theme="light"] .question-text {
        color: #111827 !important;
        border-bottom-color: rgba(0,0,0,0.06) !important;
    }
    [data-theme="light"] .response-box {
        background: #f8fafc !important;
        border-color: #e5e7eb !important;
        border-left-color: #7c3aed !important;
    }
    [data-theme="light"] .response-box::-webkit-scrollbar-thumb { background: #d1d5db !important; }
    [data-theme="light"] .response-text { color: #374151 !important; }
    [data-theme="light"] .divider { background: rgba(5,150,105,0.1) !important; }
    [data-theme="light"] .slide-metrics::-webkit-scrollbar-thumb { background: #d1d5db !important; }

    /* Badges */
    [data-theme="light"] .badge-q {
        background: rgba(5,150,105,0.08) !important;
        color: #059669 !important;
        border-color: rgba(5,150,105,0.25) !important;
    }
    [data-theme="light"] .badge-ai {
        background: rgba(124,58,237,0.08) !important;
        color: #7c3aed !important;
        border-color: rgba(124,58,237,0.25) !important;
    }
    [data-theme="light"] .badge-answer {
        background: rgba(0,0,0,0.03) !important;
        color: #6b7280 !important;
        border-color: rgba(0,0,0,0.08) !important;
    }

    /* Bloco de métrica */
    [data-theme="light"] .metric-block {
        background: rgba(5,150,105,0.03) !important;
        border-color: rgba(5,150,105,0.14) !important;
    }
    [data-theme="light"] .metric-block:hover {
        border-color: #059669 !important;
        box-shadow: 0 0 10px rgba(5,150,105,0.1) !important;
    }
    [data-theme="light"] .metric-label { color: #059669 !important; }
    [data-theme="light"] .metric-desc  { color: #6b7280 !important; }

    /* Likert slider */
    [data-theme="light"] .likert-rail  { background: #d1d5db !important; }
    [data-theme="light"] .likert-fill  {
        background: linear-gradient(90deg, #059669, #047857) !important;
    }
    [data-theme="light"] .likert-tick  {
        background: #d1d5db !important;
        border-color: #f9fafb !important;
    }
    [data-theme="light"] .likert-thumb {
        background: #059669 !important;
        border-color: #ffffff !important;
        box-shadow: 0 0 10px rgba(5,150,105,0.35) !important;
        color: #ffffff !important;
    }
    [data-theme="light"] .likert-lbl { color: #9ca3af !important; }
    [data-theme="light"] .likert-lbl.active { color: #059669 !important; }
    [data-theme="light"] .likert-emo { opacity: 0.35 !important; }
    [data-theme="light"] .likert-emo.active { opacity: 1 !important; }

    /* Campo de comentário */
    [data-theme="light"] .comment-field {
        background: #f9fafb !important;
        border-color: #d1d5db !important;
        color: #111827 !important;
    }
    [data-theme="light"] .comment-field:focus { border-color: rgba(5,150,105,0.5) !important; }
    [data-theme="light"] .comment-field::placeholder { color: #9ca3af !important; }

    /* Botões de navegação */
    [data-theme="light"] .btn-start {
        background: linear-gradient(90deg, #059669, #047857) !important;
        color: #ffffff !important;
    }
    [data-theme="light"] .btn-start:hover {
        box-shadow: 0 0 20px rgba(5,150,105,0.35) !important;
    }
    [data-theme="light"] .btn-prev {
        background: transparent !important;
        color: #6b7280 !important;
        border-color: #d1d5db !important;
    }
    [data-theme="light"] .btn-prev:hover:not(:disabled) {
        border-color: #059669 !important;
        color: #059669 !important;
    }
    [data-theme="light"] .btn-next {
        background: linear-gradient(90deg, #059669, #047857) !important;
        color: #ffffff !important;
    }
    [data-theme="light"] .btn-next:hover {
        box-shadow: 0 0 20px rgba(5,150,105,0.35) !important;
    }
    [data-theme="light"] .btn-submit-final {
        background: linear-gradient(90deg, #059669, #047857) !important;
        color: #ffffff !important;
    }
    [data-theme="light"] .btn-submit-final:hover {
        box-shadow: 0 0 20px rgba(5,150,105,0.4) !important;
    }

    /* Mensagem de conclusão */
    [data-theme="light"] .completion-msg {
        background: rgba(5,150,105,0.08) !important;
        border-color: rgba(5,150,105,0.2) !important;
    }
    [data-theme="light"] .completion-msg h3 { color: #059669 !important; }
    [data-theme="light"] .completion-msg p  { color: #6b7280 !important; }

    /* Atalhos de teclado */
    [data-theme="light"] .kbd-hint { color: #9ca3af !important; }
    [data-theme="light"] .kbd {
        background: #f3f4f6 !important;
        border-color: #d1d5db !important;
        color: #6b7280 !important;
    }

    /* Language switcher no tema claro */
    [data-theme="light"] .language-switcher form {
        background: rgba(255,255,255,0.92) !important;
        border-color: rgba(5,150,105,0.2) !important;
        box-shadow: 0 4px 16px rgba(0,0,0,0.1) !important;
    }
    [data-theme="light"] .language-switcher button { color: #6b7280 !important; }
    [data-theme="light"] .language-switcher button:hover,
    [data-theme="light"] .language-switcher button.is-active {
        background: rgba(5,150,105,0.1) !important;
        color: #059669 !important;
        box-shadow: inset 0 0 0 1px rgba(5,150,105,0.2) !important;
    }
    [data-theme="light"] .lang-divider { background: rgba(5,150,105,0.15) !important; }
    [data-theme="light"] .theme-toggle-btn { color: #6b7280 !important; }
    [data-theme="light"] .theme-toggle-btn:hover {
        background: rgba(5,150,105,0.1) !important;
        color: #059669 !important;
        box-shadow: inset 0 0 0 1px rgba(5,150,105,0.2) !important;
    }
</style>

<div class="language-switcher" aria-label="{% translate 'Selecionar idioma' %}">
    <form action="{% url 'set_language' %}" method="post">
        {% csrf_token %}
        <input name="next" type="hidden" value="{{ request.get_full_path }}">
        {% for code, name in AVAILABLE_LANGUAGES %}
            <button
                type="submit"
                name="language"
                value="{{ code }}"
                class="{% if code == CURRENT_LANGUAGE %}is-active{% endif %}"
                title="{{ name }}"
                aria-label="{{ name }}"
                {% if code == CURRENT_LANGUAGE %}aria-current="true"{% endif %}
            >
                {{ code|slice:":2"|upper }}
            </button>
        {% endfor %}

        <span class="lang-divider" aria-hidden="true"></span>

        <button
            type="button"
            class="theme-toggle-btn"
            id="themeSwitcherBtn"
            onclick="togglePonderTheme()"
            title="Alternar tema claro/escuro"
            aria-label="Alternar tema"
        >
            <span id="themeIcon">☀</span>
        </button>
    </form>
</div>

<script>
  (function () {
    function applyTheme(t) {
      var icon = document.getElementById('themeIcon');
      if (t === 'light') {
        document.documentElement.setAttribute('data-theme', 'light');
        if (icon) icon.textContent = '☽';
      } else {
        document.documentElement.removeAttribute('data-theme');
        if (icon) icon.textContent = '☀';
      }
    }

    var saved = localStorage.getItem('pondersec-theme') || 'dark';
    applyTheme(saved);

    window.togglePonderTheme = function () {
      var current = localStorage.getItem('pondersec-theme') || 'dark';
      var next = current === 'light' ? 'dark' : 'light';
      localStorage.setItem('pondersec-theme', next);
      applyTheme(next);
    };
  })();
</script>
