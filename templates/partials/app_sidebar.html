{% load i18n static %}
<aside class="side-nav" aria-label="{% translate 'Menu lateral' %}">
    <div class="side-brand">
        <div class="side-logo" aria-hidden="true">
            <img src="{% static 'pondersec_logo.jpg' %}" alt="">
        </div>
        <div class="side-brand-text">
            <div class="side-kicker">PonderSEC</div>
            <div class="side-title">Admin</div>
        </div>
    </div>

    <div class="side-section">{% translate "Menu Principal" %}</div>
    <nav class="side-links">
        <a href="{% url 'questoes' %}" class="side-link{% if active_nav == 'questoes' %} active{% endif %}">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <path d="M14 2v6h6"></path>
                <path d="M9 15h6"></path>
                <path d="M9 11h3"></path>
            </svg>
            <span>{% translate "Questões" %}</span>
        </a>

        <a href="{% url 'executar_consulta' %}" class="side-link{% if active_nav == 'consulta' %} active{% endif %}">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <circle cx="11" cy="11" r="7"></circle>
                <path d="M21 21l-4.3-4.3"></path>
                <path d="M11 8v6"></path>
                <path d="M8 11h6"></path>
            </svg>
            <span>{% translate "Consulta" %}</span>
        </a>

        <a href="{% url 'menu_avaliacao' %}" class="side-link{% if active_nav == 'avaliacao' %} active{% endif %}">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M3 20h18"></path><path d="M5 20V14"></path><path d="M8 20V10"></path><path d="M11 20V6"></path><path d="M14 20V9"></path><path d="M17 20V13"></path><path d="M20 20V16"></path>
            </svg>
            <span>{% translate "Avaliação" %}</span>
        </a>

        <a href="{% url 'setup' %}" class="side-link{% if active_nav == 'setup' %} active{% endif %}">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M12 2a2 2 0 0 1 2 2v2a2 2 0 0 1-2 2 2 2 0 0 1-2-2V4a2 2 0 0 1 2-2z"></path>
                <path d="M12 8v3"></path>
                <path d="M6.5 11a5.5 5.5 0 0 0 11 0"></path>
                <rect x="3" y="11" width="4" height="7" rx="1"></rect>
                <rect x="17" y="11" width="4" height="7" rx="1"></rect>
                <path d="M7 18h10"></path>
                <path d="M9 21h6"></path>
            </svg>
            <span>Setup</span>
        </a>
    </nav>

    <div class="side-footer">
        <a href="/" class="side-link" style="margin-bottom: 8px; border-color: rgba(14, 165, 233, 0.3); color: #38bdf8; background: rgba(14, 165, 233, 0.05);">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
            </svg>
            <span>{% translate "Chat Público" %}</span>
        </a>

        <a href="{% url 'logout' %}" class="side-logout">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                <polyline points="16 17 21 12 16 7"></polyline>
                <line x1="21" y1="12" x2="9" y2="12"></line>
            </svg>
            <span>{% translate "Sair" %}</span>
        </a>
    </div>
</aside>
