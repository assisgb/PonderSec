{% load static i18n %}
<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE|default:'pt-br' }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PonderSEC{% endblock %}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    <link rel="stylesheet" href="{% static 'css/components.css' %}">

    {% block extra_css %}{% endblock %}
</head>
<body>
    {% include "partials/language_switcher.html" %}

    {% block background_effects %}
    <div class="background-grid"></div>
    <div class="scanline"></div>
    <div class="glow-orb"></div>
    {% endblock %}

    {% block body %}{% endblock %}

    {% block extra_js %}{% endblock %}
</body>
</html>
